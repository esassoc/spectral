              </div>
            ))}
            <div style={{ marginTop: 16, padding: '10px 14px', borderRadius: 8, fontSize: 14, lineHeight: 1.7,
              background: segMode === 'pixel' ? '#fef3c7' : '#e0f2fe', color: '#334155' }}>
              {segMode === 'pixel'
                ? '⚠️ Pixel-based: notice misclassified isolated pixels ("salt-and-pepper") scattered throughout.'
                : `✅ OBIA (${scaleLevel} scale): segments group spectrally similar pixels. White borders show object boundaries. Fewer spurious pixels.`}
            </div>
          </div>
        </div>
      </Card>

      {/* Segmentation Methods table */}
      <Card>
        <div style={{ fontSize: 17, fontWeight: 700, color: '#334155', marginBottom: 16 }}>Segmentation Methods</div>
        <div style={{ overflowX: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 15 }}>
            <thead>
              <tr style={{ background: '#004562', color: '#fff' }}>
                {['Method','Tool','Key Parameters','Best For','Notes'].map(h => (
                  <th key={h} style={{ padding: '10px 14px', textAlign: 'left', fontWeight: 600, whiteSpace: 'nowrap' }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {segMethods.map((m, i) => (
                <tr key={m.name} style={{
                  background: activeMethod === i ? '#e0f2fe' : i % 2 === 0 ? '#f8fafc' : '#fff',
                  cursor: 'pointer', transition: 'background 0.15s',
                }} onClick={() => setActiveMethod(activeMethod === i ? null : i)}>
                  <td style={{ padding: '10px 14px', fontWeight: 600, color: '#1193BA' }}>{m.name}</td>
                  <td style={{ padding: '10px 14px', color: '#64748b' }}>{m.tool}</td>
                  <td style={{ padding: '10px 14px', color: '#334155', fontFamily: 'monospace', fontSize: 13 }}>{m.params}</td>
                  <td style={{ padding: '10px 14px', color: '#334155' }}>{m.best}</td>
                  <td style={{ padding: '10px 14px', color: '#64748b', fontSize: 14 }}>{m.note}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>

      {/* Parameter Cards */}
      <Card>
        <div style={{ fontSize: 17, fontWeight: 700, color: '#334155', marginBottom: 16 }}>Key Segmentation Parameters</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: 14 }}>
          {paramCards.map(p => (
            <div key={p.name} style={{
              padding: 16, borderRadius: 10, border: `2px solid ${p.color}22`,
              background: p.color + '10',
            }}>
              <div style={{ fontSize: 22, marginBottom: 6 }}>{p.icon}</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: p.color, marginBottom: 6 }}>{p.name}</div>
              <div style={{ fontSize: 14, color: '#334155', lineHeight: 1.6 }}>{p.desc}</div>
            </div>
          ))}
        </div>
      </Card>

      {/* OBIA Workflow */}
      <Card>
        <div style={{ fontSize: 17, fontWeight: 700, color: '#334155', marginBottom: 16 }}>OBIA → RF Workflow (6 Steps)</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
          {workflowSteps.map((s, i) => (
            <div key={s.num} style={{ display: 'flex', gap: 16, alignItems: 'flex-start' }}>
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                <div style={{
                  width: 36, height: 36, borderRadius: '50%', background: '#1193BA',
                  color: '#fff', fontWeight: 700, fontSize: 16,
                  display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
                }}>{s.num}</div>
                {i < workflowSteps.length - 1 && (
                  <div style={{ width: 2, flex: 1, minHeight: 24, background: '#cbd5e1', margin: '4px 0' }} />
                )}
              </div>
              <div style={{ paddingBottom: i < workflowSteps.length - 1 ? 16 : 0, paddingTop: 6 }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: '#334155' }}>{s.title}</div>
                <div style={{ fontSize: 14, color: '#64748b', lineHeight: 1.6, marginTop: 2 }}>{s.desc}</div>
              </div>
            </div>
          ))}
        </div>
        <div style={{ marginTop: 16, padding: '10px 14px', borderRadius: 8, background: '#f0fdf4', fontSize: 14, color: '#15803d', lineHeight: 1.6 }}>
          <strong>Tip:</strong> When scale is unclear, start medium, classify a test area, and adjust based on whether segments split real features (too small) or lump different classes together (too large).
        </div>
      </Card>
    </div>
  );
}

// ============================================================
// SECTION 11: Practical Implementation
// ============================================================
function Section11() {
  const [envTab, setEnvTab] = React.useState('arcpro'); // 'arcpro'|'python'|'r'
  const [rfMode, setRfMode] = React.useState('tabular'); // 'tabular'|'cell'

  const envTabs = [
    { id: 'arcpro', label: '🗺️ ArcGIS Pro (Native)' },
    { id: 'python', label: '🐍 Python / scikit-learn' },
    { id: 'r',      label: '📊 R + ArcPro R-Bridge' },
  ];

  const envContent = {
    arcpro: {
      setup: [
        { step: 'Install ArcGIS Pro 3.x', detail: 'Includes Train Random Trees Classifier and Classify Raster geoprocessing tools built-in. No additional packages required.' },
        { step: 'Activate Spatial Analyst extension', detail: 'Required for Raster Calculator, Focal Statistics, Zonal Statistics as Table, and most raster geoprocessing.' },
        { step: 'Enable Image Analyst (optional)', detail: 'Adds Segment Mean Shift and deep learning classify tools. Needed for OBIA workflows.' },
        { step: 'Set default geodatabase', detail: 'Point to a project-specific GDB. Intermediate rasters write here unless you specify .tif paths explicitly.' },
      ],
      code: `# ArcPy, Train & Classify (cell-based)
import arcpy
arcpy.env.workspace = r"C:/project/data"
arcpy.env.snapRaster = "imagery_stack.tif"
arcpy.env.cellSize = "imagery_stack.tif"

# Train
arcpy.sa.TrainRandomTreesClassifier(
    in_raster="imagery_stack.tif",
    in_training_features="training_polys.shp",
    out_classifier_definition="rf_model.ecd",
    max_num_trees=100,
    max_tree_depth=30,
    max_num_features="SQRT"
)

# Classify
arcpy.sa.ClassifyRaster(
    in_raster="imagery_stack.tif",
    in_classifier_definition="rf_model.ecd",
    out_raster="classified.tif"
)`,
    },
    python: {
      setup: [
        { step: 'Create conda environment', detail: 'Clone ArcGIS Pro default env: arcpy clone, or create fresh: conda create -n rs_rf python=3.11' },
        { step: 'Install scikit-learn', detail: 'pip install scikit-learn pandas numpy rasterio geopandas. For large stacks, consider joblib for parallel tree building.' },
        { step: 'Install rasterio + GDAL', detail: 'conda install -c conda-forge rasterio gdal. Critical for reading/writing GeoTIFF with proper CRS metadata.' },
        { step: 'Jupyter or VS Code', detail: 'Run notebooks for exploratory work; .py scripts for batch production. ArcGIS Notebooks can also host Python RF workflows.' },
      ],
      code: `import numpy as np
import rasterio
from sklearn.ensemble import RandomForestClassifier
from sklearn.model_selection import train_test_split
from sklearn.metrics import classification_report

# Load multiband raster
with rasterio.open("imagery_stack.tif") as src:
    stack = src.read()           # shape: (bands, rows, cols)
    profile = src.profile

# Reshape: pixels as rows, bands as columns
X = stack.reshape(stack.shape[0], -1).T  # (n_pixels, n_bands)
mask = ~np.any(np.isnan(X), axis=1)       # remove NoData pixels

# Load labels (from training raster same extent)
with rasterio.open("training_raster.tif") as src:
    y_full = src.read(1).ravel()

y = y_full[mask]
X = X[mask]
labeled = y > 0

X_train, X_test, y_train, y_test = train_test_split(
    X[labeled], y[labeled], test_size=0.25, stratify=y[labeled])

rf = RandomForestClassifier(
    n_estimators=150, max_depth=None,
    min_samples_leaf=5, class_weight='balanced',
    n_jobs=-1, random_state=42)
rf.fit(X_train, y_train)
print(classification_report(y_test, rf.predict(X_test)))

# Predict full raster
pred = np.zeros(X_full.shape[0], dtype=np.uint8)
pred[mask] = rf.predict(X[mask])
result = pred.reshape(stack.shape[1], stack.shape[2])`,
    },
    r: {
      setup: [
        { step: 'Install R-ArcGIS Bridge', detail: 'In ArcGIS Pro Package Manager, install "R-ArcGIS Bridge". In R, run: install.packages("arcgisbinding"). Requires R 3.5+.' },
        { step: 'Initialize bridge in R', detail: 'library(arcgisbinding); arc.check_product(). This links R to the ArcGIS Pro license. Run once per session.' },
        { step: 'Install randomForest package', detail: 'install.packages(c("randomForest","ranger","caret","sf","terra")). ranger is faster for large datasets; supports parallel processing.' },
        { step: 'Data exchange pattern', detail: 'arc.open() / arc.select() reads feature classes into R data frames. arc.write() exports results back to geodatabase feature classes or rasters.' },
      ],
      code: `library(arcgisbinding)
library(randomForest)
library(terra)
arc.check_product()

# Read training polygons from geodatabase
train_fc <- arc.open("C:/project/data.gdb/training_polys")
train_df  <- arc.select(train_fc)  # returns data.frame

# Load raster stack (terra)
stack <- rast("imagery_stack.tif")

# Extract band values at training points
pts <- vect(train_df, geom=c("SHAPE_X","SHAPE_Y"), crs="EPSG:26910")
train_vals <- extract(stack, pts, df=TRUE)
train_vals$Class <- as.factor(train_df$Class)

# Train Random Forest
rf_model <- randomForest(
  Class ~ .,
  data    = train_vals[, -1],
  ntree   = 150,
  mtry    = floor(sqrt(nlyr(stack))),
  importance = TRUE
)
print(rf_model)
varImpPlot(rf_model)

# Predict raster (terra predict)
predicted <- predict(stack, rf_model, type="response")
writeRaster(predicted, "classified_r.tif", overwrite=TRUE)`,
    },
  };

  const rasterPrepItems = [
    { icon: '📁', title: 'Format: GeoTIFF', color: '#1193BA',
      desc: 'Save all inputs as .tif (not .img, .ecw, or file GDB raster). GeoTIFF preserves CRS, supports multi-band, and is readable by all tools (ArcPro, GDAL, R, Python).' },
    { icon: '📌', title: 'Snap Raster', color: '#004562',
      desc: 'Set Environment → Snap Raster to your base imagery. This aligns all derived rasters (indices, terrain) to the same pixel grid, essential for stack building.' },
    { icon: '📐', title: 'Cell Size', color: '#F9A134',
      desc: 'Set Environment → Cell Size to match your analysis resolution. Mixing resolutions causes resampling artifacts. Resample upfront, not during stack building.' },
    { icon: '🌐', title: 'Projection / CRS', color: '#8FCEA5',
      desc: 'Project all layers to a single coordinate system before analysis. Use a local projected CRS (UTM, State Plane), not geographic (lat/lon) for raster math.' },
    { icon: '⬛', title: 'NoData Handling', color: '#a855f7',
      desc: 'Ensure NoData values are consistent across layers. A single pixel with NoData in any band will be excluded from RF prediction. Use "Extract by Mask" to clip to AOI first.' },
    { icon: '🏗️', title: 'Build Raster Stack', color: '#00A79D',
      desc: 'Use "Composite Bands" (ArcPro) or rasterio/terra to combine all inputs into one multiband GeoTIFF. Band order should be documented in metadata.' },
  ];

  const arcproTools = [
    { tool: 'Raster Calculator', toolbox: 'Spatial Analyst → Map Algebra', use: 'Compute indices (NDVI, NDMI, etc.), boolean masks, conditional reclassification', tip: 'Use Python syntax. Float() cast prevents integer division errors: Float("NIR" - "Red") / Float("NIR" + "Red")' },
    { tool: 'Focal Statistics', toolbox: 'Spatial Analyst → Neighborhood', use: 'Generate texture/context features: local mean, std, range, max within a kernel', tip: 'Use odd kernel sizes (3×3, 5×5, 7×7). Std and Range capture texture; Mean smooths noise.' },
    { tool: 'Zonal Statistics as Table', toolbox: 'Spatial Analyst → Zonal', use: 'Summarize raster values (mean, std, range, max) per polygon/segment for tabular RF', tip: 'Run once per input raster. Join all results by segment ID before RF training.' },
    { tool: 'Segment Mean Shift', toolbox: 'Image Analyst → Segmentation and Classification', use: 'Generate image segments (objects) for OBIA workflows', tip: 'Spectral Detail 12-18, Spatial Detail 12-18, Min Segment Size 20 is a typical starting point.' },
    { tool: 'Train Random Trees Classifier', toolbox: 'Image Analyst → Classification Tools', use: 'Train RF model on training polygons + multiband imagery stack', tip: 'Outputs an .ecd (classifier definition) file. Supports Max Samples Per Class for class balancing.' },
    { tool: 'Classify Raster', toolbox: 'Image Analyst → Classification Tools', use: 'Apply .ecd classifier definition to full imagery stack', tip: 'Output is an integer raster. Run "Build Raster Attribute Table" after to attach class names.' },
    { tool: 'Extract by Mask', toolbox: 'Spatial Analyst → Extraction', use: 'Clip rasters to AOI boundary before analysis', tip: 'Apply to all inputs before stacking. Reduces processing extent and prevents NoData bleed at edges.' },
    { tool: 'Polygon to Raster', toolbox: 'Conversion Tools → To Raster', use: 'Convert classified polygon segments back to raster for delivery', tip: 'Set Environment → Snap Raster and Cell Size first. Use "MAXIMUM_COMBINED_AREA" assignment type for best edge alignment.' },
  ];

  const focalStats = [
    { stat: 'MEAN', icon: '〰️', color: '#1193BA',
      desc: 'Local average reflectance/value within kernel. Smooths noise; useful as a cleaned feature for low-contrast surfaces like water or bare soil.' },
    { stat: 'STD', icon: '📊', color: '#F9A134',
      desc: 'Local standard deviation = texture roughness. High values = heterogeneous (forest edge, disturbed areas). Low values = homogeneous (water, agricultural fields).' },
    { stat: 'RANGE', icon: '↕️', color: '#8FCEA5',
      desc: 'Local max − min = contrast. Captures edges and boundaries. Especially useful for detecting structural features in LiDAR-derived CHM or SWIR.' },
    { stat: 'MAX', icon: '⬆️', color: '#a855f7',
      desc: 'Local maximum. Useful for canopy height (CHM max = tallest tree in neighborhood) and detecting linear features like roads in elevation data.' },
  ];

  const rfModes = {
    tabular: {
      title: 'Tabular / Segment-Based RF',
      color: '#1193BA',
      icon: '📋',
      steps: [
        'Segment imagery → polygons (OBIA)',
        'Zonal Statistics as Table for each input layer',
        'Join all zonal stats by Segment ID',
        'Label subset of segments (training data)',
        'Train RF on segment-level feature table',
        'Predict class for all unlabeled segments',
        'Polygon to Raster → final classified raster',
      ],
      pros: ['Fewer noise/salt-pepper artifacts', 'Can use shape/context features', 'Faster RF fit (fewer samples)', 'Easier manual editing of segment polygons'],
      cons: ['Segmentation errors propagate to RF', 'More preprocessing steps', 'Requires OBIA segmentation step', 'Object boundaries may not align with true features'],
    },
    cell: {
      title: 'Cell-Based / Pixel-Based RF',
      color: '#F9A134',
      icon: '🔲',
      steps: [
        'Build multiband raster stack (bands + indices)',
        'Create training raster (or polygon → raster)',
        'Sample pixel values at training locations',
        'Train RF on pixel-level feature table',
        'Predict class for every pixel in AOI',
        'Optional: majority filter to reduce speckle',
        'Deliver classified raster directly',
      ],
      pros: ['Simpler workflow, no segmentation', 'Native to ArcPro Train Random Trees', 'Preserves original raster resolution', 'Easier to parallelize over large areas'],
      cons: ['Salt-and-pepper noise common', 'Ignores spatial context between pixels', 'More training samples needed (pixels dense)', 'Post-classification smoothing often required'],
    },
  };

  const active = rfModes[rfMode];

  return (
    <div>
      <SectionTitle id="sec-11">11. Practical Implementation</SectionTitle>

      {/* Environment Setup */}
      <Card>
        <div style={{ fontSize: 17, fontWeight: 700, color: '#334155', marginBottom: 16 }}>Environment Setup</div>
        <div style={{ display: 'flex', gap: 8, marginBottom: 20, flexWrap: 'wrap' }}>
          {envTabs.map(t => (
            <button key={t.id} onClick={() => setEnvTab(t.id)} style={{
              padding: '9px 20px', borderRadius: 8, fontWeight: 600, fontSize: 15, cursor: 'pointer',
              background: envTab === t.id ? '#004562' : '#f1f5f9',
              color: envTab === t.id ? '#fff' : '#64748b',
              border: `2px solid ${envTab === t.id ? '#004562' : '#cbd5e1'}`,
            }}>{t.label}</button>
          ))}
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
          {/* Setup steps */}
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: '#334155', marginBottom: 10 }}>Setup Steps</div>

              <div key={i} style={{ display: 'flex', gap: 12, marginBottom: 12, alignItems: 'flex-start' }}>
                <div style={{

          {/* Code snippet */}
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: '#334155', marginBottom: 10 }}>Code Snippet</div>
            <pre style={{
              background: '#0f172a', color: '#e2e8f0', padding: 16, borderRadius: 8,

        <div style={{ fontSize: 17, fontWeight: 700, color: '#334155', marginBottom: 16 }}>Raster Preparation Checklist</div>

          These steps must be completed before building your feature stack. Skipping any one of them is the most common source of errors in RS/RF projects.
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: 14 }}>
          {rasterPrepItems.map(item => (
            <div key={item.title} style={{
              padding: 16, borderRadius: 10, borderLeft: `4px solid ${item.color}`,
              background: '#f8fafc', display: 'flex', flexDirection: 'column', gap: 6,
            }}>
              <div style={{ fontSize: 20 }}>{item.icon}</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: item.color }}>{item.title}</div>
              <div style={{ fontSize: 13, color: '#334155', lineHeight: 1.6 }}>{item.desc}</div>

        </div>
      </Card>

      {/* ArcGIS Pro Tools Reference */}
      <Card>
        <div style={{ fontSize: 17, fontWeight: 700, color: '#334155', marginBottom: 16 }}>ArcGIS Pro Tools Reference</div>
        <div style={{ overflowX: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 14 }}>
            <thead>
              <tr style={{ background: '#004562', color: '#fff' }}>
                {['Tool','Toolbox Path','Primary Use','Practical Tip'].map(h => (
                  <th key={h} style={{ padding: '10px 14px', textAlign: 'left', fontWeight: 600, whiteSpace: 'nowrap' }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {arcproTools.map((t, i) => (
                <tr key={t.tool} style={{ background: i % 2 === 0 ? '#f8fafc' : '#fff' }}>
                  <td style={{ padding: '10px 14px', fontWeight: 700, color: '#1193BA', whiteSpace: 'nowrap' }}>{t.tool}</td>
                  <td style={{ padding: '10px 14px', color: '#64748b', fontSize: 13, fontStyle: 'italic' }}>{t.toolbox}</td>
                  <td style={{ padding: '10px 14px', color: '#334155' }}>{t.use}</td>
                  <td style={{ padding: '10px 14px', color: '#64748b', fontSize: 13 }}>{t.tip}</td>

      {/* Focal Statistics Explainer */}
      <Card>
        <div style={{ fontSize: 17, fontWeight: 700, color: '#334155', marginBottom: 8 }}>Focal Statistics, When & Why</div>
        <div style={{ fontSize: 14, color: '#64748b', marginBottom: 16 }}>
          Focal Statistics computes a summary value for each pixel based on its neighborhood (kernel). This is how you add <strong>spatial context and texture</strong> to pixel-level features, giving the RF classifier information about the local environment, not just the pixel's own spectral value.
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 14, marginBottom: 16 }}>
          {focalStats.map(f => (
            <div key={f.stat} style={{
              padding: 16, borderRadius: 10, border: `2px solid ${f.color}33`,
              background: f.color + '0F',
            }}>
              <div style={{ fontSize: 24, marginBottom: 4 }}>{f.icon}</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: f.color, marginBottom: 6 }}>{f.stat}</div>
              <div style={{ fontSize: 13, color: '#334155', lineHeight: 1.6 }}>{f.desc}</div>
            </div>
          ))}
        </div>
        <div style={{ padding: '10px 16px', borderRadius: 8, background: '#f0fdf4', fontSize: 14, color: '#15803d' }}>
          <strong>Kernel size rule of thumb:</strong> Use 3×3 for fine texture, 5×5 for neighborhood context, 7×7 or larger for landscape-level patterns. Always use odd-numbered kernels (3, 5, 7, 9…) to keep the center pixel at the focal point. Compute focal features on continuous inputs (reflectance, CHM) before RF, not after classification.
        </div>
      </Card>

      {/* Tabular vs Cell-Based RF */}
      <Card>
        <div style={{ fontSize: 17, fontWeight: 700, color: '#334155', marginBottom: 16 }}>Tabular vs. Cell-Based RF Workflow</div>
        <div style={{ display: 'flex', gap: 10, marginBottom: 20 }}>
          {[['tabular','📋 Tabular (Segment-Based)'],['cell','🔲 Cell-Based (Pixel-Based)']].map(([id, label]) => (
            <button key={id} onClick={() => setRfMode(id)} style={{
              padding: '9px 22px', borderRadius: 8, fontWeight: 600, fontSize: 15, cursor: 'pointer',
              background: rfMode === id ? active.color : '#f1f5f9',
              color: rfMode === id ? '#fff' : '#64748b',
              border: `2px solid ${rfMode === id ? active.color : '#cbd5e1'}`,
            }}>{label}</button>
          ))}
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 20 }}>
          {/* Workflow Steps */}
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: '#334155', marginBottom: 12 }}>Workflow Steps</div>
            {active.steps.map((s, i) => (
              <div key={i} style={{ display: 'flex', gap: 10, alignItems: 'flex-start', marginBottom: 10 }}>
                <div style={{
                  width: 24, height: 24, borderRadius: '50%', background: active.color,
                  color: '#fff', fontWeight: 700, fontSize: 12, flexShrink: 0,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}>{i + 1}</div>
                <div style={{ fontSize: 14, color: '#334155', lineHeight: 1.5, paddingTop: 2 }}>{s}</div>
              </div>
            ))}
          </div>

          {/* Pros */}
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: '#15803d', marginBottom: 12 }}>✅ Advantages</div>
            {active.pros.map((p, i) => (
              <div key={i} style={{
                padding: '8px 12px', borderRadius: 6, background: '#f0fdf4',
                fontSize: 14, color: '#334155', marginBottom: 6, lineHeight: 1.5,
              }}>{p}</div>
            ))}
          </div>

          {/* Cons */}
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: '#dc2626', marginBottom: 12 }}>⚠️ Limitations</div>
            {active.cons.map((c, i) => (
              <div key={i} style={{
                padding: '8px 12px', borderRadius: 6, background: '#fff7ed',
                fontSize: 14, color: '#334155', marginBottom: 6, lineHeight: 1.5,
              }}>{c}</div>
            ))}
          </div>
        </div>

        <div style={{ marginTop: 16, padding: '10px 14px', borderRadius: 8, background: '#f0f9ff', fontSize: 14, color: '#0369a1' }}>
          <strong>Choosing between them:</strong> Use <strong>Cell-Based</strong> for moderate resolution (10–30 m), large AOIs, or when you need simplicity. Use <strong>Tabular/Segment-Based</strong> for high-resolution imagery (sub-5 m), when feature edges matter (wetland delineation, urban mapping), or when training data is limited and each polygon covers many pixels.
        </div>
      </Card>

      <Card>
        <SubHeading>Resampling Method Selection</SubHeading>
        <p>Every time a raster is reprojected, resampled, or rescaled in ArcPro, a resampling method is applied. <strong>Choosing the wrong method is one of the most common silent errors in RS workflows</strong>, it creates new pixel values that never existed in the source data.</p>

        <MTable
          headers={['Method', 'How It Works', 'Use For', 'Never Use For']}
          rows={[
            ['Nearest Neighbor', 'Assigns each output pixel the value of the closest input pixel. No new values created.', 'Classified/thematic rasters (land cover, burn severity classes, NLCD). Any raster where pixel values are codes, not measurements.', 'Continuous data (spectral bands, indices, elevation): creates blocky staircase artifacts.'],
            ['Bilinear Interpolation', 'Weighted average of 4 nearest input pixels. Smooth output.', 'Continuous rasters: spectral bands, DEMs, index layers, CHM.', 'Classified rasters; averages class codes, creating values like 2.7 that represent no real class.'],
            ['Cubic Convolution', 'Weighted average of 16 nearest pixels. Sharpest result.', 'Continuous rasters where visual sharpness matters (display products, hill shades, final deliverable imagery).', 'Classified rasters. Can overshoot edge values (e.g., negative reflectance); avoid for index layers used in RF.'],
            ['Majority', 'Most common value in the kernel neighborhood.', 'Classified rasters that need resampling to coarser resolution (e.g., 1m classified → 10m summary).', 'Continuous data; majority of floating-point values is rarely meaningful.'],
          ]}
        />

        <div style={{ background: '#fef3c7', borderRadius: 8, padding: 14, marginTop: 12, borderLeft: '3px solid #F9A134' }}>
          <strong style={{ color: '#92400e' }}>⚠ ArcPro Default Trap:</strong> <span style={{ fontSize: 14, color: '#78350f' }}>ArcPro's default resampling is <strong>Bilinear</strong> in many tools (Project Raster, Resample, Extract by Mask). When processing a classified output raster, always explicitly set resampling to <strong>Nearest Neighbor</strong> in the tool dialog or via the Environments tab → Raster Analysis → Resampling Technique.</span>
        </div>
      </Card>

      <Card>
        <SubHeading>Post-Classification Cleanup Workflow</SubHeading>
        <p>Raw classified rasters almost always contain salt-and-pepper noise, isolated single-pixel misclassifications, and boundaries that don't align with identifiable features. This cleanup workflow converts a raw RF output into a deliverable product. <strong>Every step should be documented in the project accuracy report.</strong></p>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 16 }}>
          {[
            { step: '1', label: 'Majority Filter', tool: 'Spatial Analyst → Generalization → Majority Filter', detail: 'Replaces isolated pixels with the majority class of their 3×3 or 5×5 neighborhood. Eliminates single-pixel noise without changing patch boundaries significantly. Run twice for stronger smoothing (but watch for small genuine features being erased).', color: '#1193BA' },
            { step: '2', label: 'Boundary Clean', tool: 'Spatial Analyst → Generalization → Boundary Clean', detail: 'Smooths jagged class boundaries. Expands dominant classes slightly to eliminate fringe pixels. Run after Majority Filter. Set "sort type" to DESCEND to favor larger patches expanding into smaller ones.', color: '#00A79D' },
            { step: '3', label: 'Nibble (optional)', tool: 'Spatial Analyst → Generalization → Nibble', detail: 'Fills NoData holes in the classified output with the nearest valid class value. Use when extraction masks or cloud masks leave gaps that need filling for a seamless product.', color: '#8FCEA5' },
            { step: '4', label: 'MMU Enforcement (Sieve / Region Group)', tool: 'Raster Calculator + Region Group + Zonal Statistics', detail: 'Minimum Mapping Unit: identify all connected patches smaller than your MMU (e.g., 0.1 ac = ~4 pixels at 1m). Workflow: Region Group → Zonal Statistics as Table (count pixels per region) → join back → reclassify small regions to their dominant neighbor. No single ArcPro tool does this cleanly, requires scripted approach or manual editing.', color: '#F9A134' },
            { step: '5', label: 'Raster to Polygon', tool: 'Conversion Tools → From Raster → Raster to Polygon', detail: 'Convert classified raster to polygon feature class. Set "Simplify" = TRUE for smoothed boundaries (default). Uncheck Simplify only when pixel-exact boundaries are required. Attribute table will contain "gridcode" = class code, join to a class name lookup table.', color: '#a855f7' },
            { step: '6', label: 'Eliminate', tool: 'Data Management → Generalization → Eliminate', detail: 'Merges small polygons that fall below the MMU into the neighboring polygon with the longest shared boundary (default) or largest area. This is the vector-side MMU enforcement, run after Raster to Polygon, before Dissolve. Set up a selection first: select polygons where Shape_Area < [MMU threshold in map units] so Eliminate only targets the slivers. Preserves class codes on all polygons above the threshold.', color: '#00A79D' },
            { step: '7', label: 'Dissolve & Smooth Polygon', tool: 'Data Management → Dissolve; Cartography → Smooth Polygon', detail: 'Dissolve by class code to merge adjacent same-class polygons. Then Smooth Polygon (PAEK algorithm, tolerance = 1–2× pixel size) to remove digitizing artifacts. Final output should be reviewed against aerial imagery before delivery.', color: '#ef4444' },
          ].map(s => (
            <div key={s.step} style={{ display: 'flex', gap: 12, alignItems: 'flex-start', background: '#f8fafc', borderRadius: 8, padding: '10px 14px', borderLeft: `3px solid ${s.color}` }}>
              <div style={{ minWidth: 28, height: 28, borderRadius: '50%', background: s.color, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: 14, flexShrink: 0 }}>{s.step}</div>
              <div>
                <div style={{ fontWeight: 600, color: '#334155', fontSize: 15 }}>{s.label}</div>
                <div style={{ fontSize: 12, color: '#1193BA', fontFamily: 'monospace', marginBottom: 3 }}>{s.tool}</div>
                <div style={{ fontSize: 14, color: '#64748b' }}>{s.detail}</div>
              </div>
            </div>
          ))}
        </div>
      </Card>

      <Card>
        <SubHeading>Rule-Based Masking &amp; Domain Constraints</SubHeading>
        <p>RF will predict a class for every pixel, including pixels where that class is physically impossible. Domain knowledge constraints applied <em>after</em> RF classification can significantly reduce systematic errors without retraining the model. This is standard practice on ESA deliverables.</p>

        <MTable
          headers={['Constraint Type', 'Example Rule', 'ArcPro Implementation', 'Why It Helps']}
          rows={[
            ['Slope constraint', 'Wetland class impossible on slopes > 15°', 'Con(Slope > 15 & classified == wetland_code, neighbor_class, classified)', 'Eliminates physiographically impossible wetland predictions on steep slopes, common RF error when training data has limited slope variation.'],
            ['Elevation constraint', 'Alpine/subalpine class only above 1200m', 'Con(DEM < 1200 & classified == alpine_code, next_best_class, classified)', 'Prevents alpine classes from being predicted in valley bottoms where they are climatically impossible.'],
            ['Water mask pre-constraint', 'Mask permanent water before vegetation classification', 'Create NDWI > 0.2 binary mask → SetNull on input stack before RF, or reclassify RF output within water mask to Water class', 'RF often misclassifies dark water as Conifer Forest (both have low NIR). A pre-computed water mask eliminates this confusion class.'],
            ['Urban/impervious mask', 'Force Built/Impervious within known parcel or building footprint layer', 'Polygon to Raster from building layer → Con(building_raster == 1, impervious_code, classified)', 'Avoids misclassifying solar panels as water or rooftops as bare soil, common in urban-adjacent projects.'],
            ['Hydroperiod constraint', 'Wetland class requires ≥ 2 of 4 seasonal composites showing NDWI > 0', 'Sum of seasonal NDWI > 0 masks → Con(sum_mask < 2 & classified == wetland, upland_code, classified)', 'Distinguishes jurisdictional wetlands (periodically inundated) from uplands that happen to have similar spectral signatures in peak-green season.'],
          ]}
        />

        <div style={{ background: '#f0fdf4', borderRadius: 8, padding: 14, marginTop: 12, fontSize: 14, color: '#166534' }}>
          <strong>General pattern in Raster Calculator:</strong> <code style={{ background: '#dcfce7', padding: '2px 6px', borderRadius: 4 }}>Con(constraint_condition AND classified_raster == target_code, replacement_code, classified_raster)</code><br/>
          <span style={{ color: '#14532d', marginTop: 6, display: 'block' }}>Chain multiple constraints sequentially, applying the most confident domain rules first. Document every constraint rule in the project accuracy report, they are part of the classification methodology.</span>
        </div>
      </Card>
    </div>
  );
}

// ============================================================
// SECTION 12: Data Sources & Download Links
// ============================================================
function Section12() {
  const [activeTab, setActiveTab] = React.useState('national');

  const TYPE_COLORS = {
    'Satellite': '#1193BA', 'LiDAR': '#a855f7', 'Aerial': '#22c55e',
    'Multi-Type': '#66CAD8', 'Ocean/Coastal': '#0ea5e9', 'Commercial': '#ef4444',
  };

  const sources = {
    national: [
      { name: 'USGS Earth Explorer', type: 'Satellite', desc: 'Primary archive for Landsat 4–9 (30m), ASTER (15m), historical aerial photography, and NAIP. Full global Landsat archive back to 1972.', url: 'https://earthexplorer.usgs.gov', formats: 'GeoTIFF, HDF, JPEG2000', notes: 'Create a free USGS account to download. Use "Bulk Download Application" for large orders. Landsat Collection 2 Level-2 products have atmospheric correction already applied.' },
      { name: 'Copernicus Dataspace', type: 'Satellite', desc: 'Official ESA portal for all Sentinel missions: Sentinel-1 (SAR, 10m), Sentinel-2 (optical, 10–20m), Sentinel-3 (ocean color/SST, 300m), Sentinel-5P (atmospheric). Free and open.', url: 'https://dataspace.copernicus.eu', formats: 'SAFE, GeoTIFF (COG)', notes: 'Download Sentinel-2 L2A (surface reflectance) products, avoid L1C unless specifically needed. CDSE portal replaced old Sci-Hub in 2023. OpenSearch API available for scripted bulk download.' },
      { name: 'USDA NAIP (NRCS Box)', type: 'Aerial', desc: '0.6m resolution 4-band (R/G/B/NIR) aerial imagery. Annual coverage of CONUS during growing season. Organized by state, county, and quarter-quad.', url: 'https://nrcs.box.com/v/naip', formats: 'JPEG2000, GeoTIFF', notes: 'Also accessible via USGS Earth Explorer and AWS Open Data (s3://naip-source). Box delivery is fastest for state-wide downloads. Most recent vintage is typically 1–2 years old.' },
      { name: 'Google Earth Engine', type: 'Multi-Type', desc: 'Cloud-based platform with petabyte-scale archive of Landsat, Sentinel-1/2, MODIS, NAIP, and hundreds of derived products. Free for research and noncommercial use.', url: 'https://earthengine.google.com', formats: 'GeoTIFF (export)', notes: 'Use ee.ImageCollection("COPERNICUS/S2_SR_HARMONIZED") for Sentinel-2 L2A. Ideal for time series, compositing, and cloud masking at scale before downloading to ArcPro.' },
      { name: 'USGS 3DEP LiDAR Explorer', type: 'LiDAR', desc: 'National 3D Elevation Program, the authoritative source for LiDAR point clouds and 1m bare-earth DEMs across CONUS. Coverage has expanded rapidly since 2016.', url: 'https://apps.nationalmap.gov/lidar-explorer', formats: 'LAZ, GeoTIFF (1m DEM)', notes: 'Check coverage quality before ordering, older tiles may be 4–8 pts/m², newer acquisitions 8–20 pts/m². Use the "3DEP LiDAR Point Cloud" layer to verify coverage dates and density before downloading.' },
      { name: 'OpenTopography', type: 'LiDAR', desc: 'Community portal for high-resolution LiDAR point clouds and DEMs. Aggregates datasets from USGS 3DEP, regional consortia, and research campaigns. Global coverage including international datasets.', url: 'https://opentopography.org', formats: 'LAZ, GeoTIFF, ASCII', notes: 'Supports on-demand DEM generation from point clouds at custom resolution and projection. API access available. Useful for finding LiDAR datasets not indexed in USGS 3DEP.' },
      { name: 'NOAA Digital Coast', type: 'Ocean/Coastal', desc: 'Coastal-focused LiDAR library, sea-level rise tools, tidal gauge data, and inundation mapping layers. Excellent for estuarine, shoreline, and coastal wetland projects.', url: 'https://coast.noaa.gov/digitalcoast', formats: 'LAZ, GeoTIFF, CSV', notes: 'Use the Data Access Viewer for point cloud downloads filtered by location. Particularly valuable for Florida, Oregon, and California coastal projects where post-storm LiDAR acquisitions supplement standard 3DEP coverage.' },
      { name: 'NOAA CoastWatch / OceanWatch', type: 'Ocean/Coastal', desc: 'Near-real-time and archive satellite ocean products: SST, chlorophyll-a concentration, NDCI, turbidity, and harmful algal bloom (HAB) indices. Sentinel-3 OLCI and MODIS Aqua/Terra.', url: 'https://coastwatch.noaa.gov', formats: 'NetCDF, GeoTIFF', notes: 'Chlorophyll-a products (OC3, CI algorithms) are the primary satellite data source for algal bloom monitoring and water quality RS work. Use the ERDDAP server for time-series extraction at specific monitoring locations.' },
    ],
    washington: [
      { name: 'WA DNR LiDAR Portal', type: 'LiDAR', desc: 'Primary state portal for Washington LiDAR data. Searchable by quad, county, or custom extent. Downloadable point clouds (LAZ) and derivative DEMs/DSMs for most of the state.', url: 'https://lidarportal.dnr.wa.gov', formats: 'LAZ, GeoTIFF', notes: 'Most acquisitions are 8+ pts/m². Metadata includes acquisition date, point density, and coordinate system. Some older tiles use NAVD88 vertical datum, verify before use. Regularly updated as new county acquisitions complete.' },
      { name: 'Puget Sound LiDAR Consortium', type: 'LiDAR', desc: 'High-density LiDAR for the greater Puget Sound region including King, Pierce, Snohomish, Kitsap, and surrounding counties. University of Washington hosted. Often higher density than 3DEP tiles.', url: 'https://pugetsoundlidar.ess.washington.edu', formats: 'LAZ, ASCII', notes: 'Best source for urban and suburban Puget Sound LiDAR. Older acquisition dates (2000s–2010s) for some areas but very high quality. Check against WA DNR portal for more recent replacements.' },
    ],
    oregon: [
      { name: 'DOGAMI LiDAR (Oregon Geology)', type: 'LiDAR', desc: 'Oregon Department of Geology and Mineral Industries hosts the Oregon LiDAR Consortium data. Statewide LiDAR catalog with downloadable tiles by county or watershed.', url: 'https://www.oregongeology.org', formats: 'LAZ, GeoTIFF', notes: 'Navigate to Resources > LiDAR. Coverage is extensive for western Oregon; eastern Oregon is patchier. Coordinate with USGS 3DEP for gaps. Some tiles available via OpenTopography mirror.' },
    ],
    florida: [
      { name: 'FL Division of Emergency Management GIS', type: 'LiDAR', desc: 'Post-disaster LiDAR acquisitions for Florida. Covers affected counties following major hurricane events, Irma, Michael, Ian, and others. Often higher point density than standard 3DEP tiles for recently acquired areas.', url: 'https://www.floridadisaster.org/gis', formats: 'LAZ, GeoTIFF', notes: 'Primary state-specific RS source for FL. For all other FL imagery (Sentinel-2, Landsat, NAIP, coastal LiDAR) use the National tab, USGS 3DEP, NOAA Digital Coast, USGS Earth Explorer, and Copernicus Dataspace all provide strong Florida coverage.' },
    ],
    commercial: [
      { name: 'NearMap', type: 'Commercial', desc: '5–7.5cm resolution aerial imagery updated 2–3 times per year in urban/suburban areas. Vertical and oblique views. Change detection overlays compare dates. AI content packs include building footprints and rooftop attributes.', url: 'https://www.nearmap.com', formats: 'GeoTIFF (API/WMS), SLPK (3D)', notes: 'ArcGIS Pro integration via WMS or ArcGIS Living Atlas connection. Excellent for construction monitoring, post-disturbance site documentation, and high-res training data collection in urban-adjacent ESA projects. Subscription required, check if firm has enterprise license.' },
      { name: 'Planet Labs (PlanetScope / SkySat)', type: 'Commercial', desc: 'Daily 3m PlanetScope RGB+NIR imagery for the entire Earth. 50cm SkySat tasked imagery. Monthly 5m Sentinel-2-like basemaps (Planet Basemaps). RapidEye archive (5m, Red Edge band).', url: 'https://www.planet.com', formats: 'GeoTIFF (COG)', notes: 'RapidEye archive (pre-2020) has a Red Edge band not available on standard PlanetScope, useful for NDRE. Planet Basemaps (monthly cloud-free) are high-quality for change detection time series. Education and research programs available. Commercial subscription for production use.' },
      { name: 'Maxar WorldView / GeoEye', type: 'Commercial', desc: '30–50cm commercial satellite imagery (WorldView-2/3/4, GeoEye-1). 8-band multispectral (WV-2/3) includes coastal, yellow, Red Edge, and NIR-2 bands beyond standard RGBNIR. Archive back to 1999.', url: 'https://www.maxar.com', formats: 'GeoTIFF, NITF', notes: 'Best spatial resolution available from orbit for ESA project work. 8-band WV products enable advanced spectral indices not possible with 4-band sensors. Accessible via ESRI/ArcGIS Online Image Service or direct Maxar license. USGS has negotiated access for government projects.' },
      { name: 'ESRI Living Atlas of the World', type: 'Commercial', desc: 'Curated collection of authoritative global and US datasets in ArcGIS Online: basemaps, Sentinel-2 analysis layers (NDVI, NBR, NDWI, EVI pre-computed), demographic data, ecological layers, and real-time feeds.', url: 'https://livingatlas.arcgis.com', formats: 'Image Service, Feature Service, WMS', notes: 'Sentinel-2 Views in Living Atlas provide pre-computed index layers (10-day composites) without needing to download raw imagery, useful for quick reconnaissance and training data context. ESRI ArcGIS subscription required for most content (included with standard ArcGIS Pro license).' },
      { name: 'ESRI World Imagery Wayback', type: 'Commercial', desc: 'Historical archive of ESRI\'s World Imagery basemap. Browse imagery by date to find the best cloud-free acquisition for a specific location and time period. Useful for visual change detection QA and historical documentation.', url: 'https://livingatlas.arcgis.com/wayback', formats: 'Image Service (WMTS)', notes: 'Access directly in ArcGIS Pro via the Wayback Imagery catalog. Export specific dates as raster tiles for inclusion in project reports. Best for documentation rather than quantitative analysis, radiometric calibration varies across basemap tile sources.' },
      { name: 'ESRI ArcGIS Image for ArcGIS Online', type: 'Commercial', desc: 'On-demand Sentinel-2 and Landsat image services through ArcGIS Online portal. Pre-applied band combinations, analysis-ready time series, and raster function templates for common indices.', url: 'https://www.arcgis.com/home/group.html?id=a09acd5ed2b149c2ab0aae81b6ead3aa', formats: 'Image Service', notes: 'Enables quick index visualization and time series exploration without downloading data. "Sentinel-2 10m Land Use/Land Cover" time series by Impact Observatory is a useful 10-class global product for landscape context. Requires ArcGIS Online subscription.' },
    ],
  };

  const tabs = [
    { id: 'national', label: 'National' },
    { id: 'washington', label: 'Washington' },
    { id: 'oregon', label: 'Oregon' },
    { id: 'florida', label: 'Florida' },
    { id: 'commercial', label: 'Commercial' },
  ];

  return (
    <div>
      <SectionTitle id="sec-12">12. Data Sources &amp; Download Links</SectionTitle>

      <Card>
        <p>Core remote sensing data sources, satellite imagery, LiDAR point clouds, and aerial photography. Supporting reference data (NWI, land cover, agency GIS layers) is intentionally excluded; those belong in project data directories, not here. California RS data is fully served by the National tab. URLs current as of 2025.</p>

        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 20 }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setActiveTab(t.id)}
              style={{
                padding: '8px 18px', borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: 'pointer',
                background: activeTab === t.id ? '#004562' : '#f1f5f9',
                color: activeTab === t.id ? '#fff' : '#64748b',
                border: `2px solid ${activeTab === t.id ? '#004562' : '#e2e8f0'}`,
                transition: 'all 0.15s',
              }}>
              {t.label}
            </button>
          ))}
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(440px, 1fr))', gap: 14 }}>
          {sources[activeTab].map(s => (
            <div key={s.name} style={{ background: '#f8fafc', borderRadius: 10, padding: 16, borderLeft: `4px solid ${TYPE_COLORS[s.type] || '#94a3b8'}`, display: 'flex', flexDirection: 'column', gap: 6 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8 }}>
                <div style={{ fontWeight: 700, color: '#1e293b', fontSize: 16 }}>{s.name}</div>
                <span style={{ fontSize: 11, background: TYPE_COLORS[s.type] || '#94a3b8', color: '#fff', padding: '3px 9px', borderRadius: 12, whiteSpace: 'nowrap', flexShrink: 0 }}>{s.type}</span>
              </div>
              <div style={{ fontSize: 14, color: '#475569', lineHeight: 1.55 }}>{s.desc}</div>
              {s.formats && (
                <div style={{ fontSize: 13, color: '#64748b' }}><strong style={{ color: '#334155' }}>Formats:</strong> {s.formats}</div>
              )}
              {s.notes && (
                <div style={{ fontSize: 13, color: '#64748b', background: '#f1f5f9', borderRadius: 6, padding: '6px 10px', lineHeight: 1.5 }}>{s.notes}</div>
              )}
              <a href={s.url} target="_blank" rel="noopener noreferrer"
                style={{ fontSize: 13, color: '#1193BA', textDecoration: 'none', fontWeight: 600, marginTop: 2, wordBreak: 'break-all' }}>
                &#x1F517; {s.url}
              </a>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

// ============================================================
// SECTION 13: Glossary
// ============================================================
function Section13() {
  const [search, setSearch] = React.useState('');
  const [catFilter, setCatFilter] = React.useState('All');

  const categories = ['All', ...new Set(GLOSSARY.map(g => g.cat))];

  const filtered = GLOSSARY.filter(g => {
    if (catFilter !== 'All' && g.cat !== catFilter) return false;
    if (search && !g.term.toLowerCase().includes(search.toLowerCase()) && !g.def.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }).sort((a, b) => a.term.localeCompare(b.term));

  return (
    <div>
      <SectionTitle id="sec-13">13. Glossary &amp; Quick Reference</SectionTitle>

      <Card>
        <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', marginBottom: 16 }}>
          <input type="text" value={search} onChange={e => setSearch(e.target.value)}
            placeholder="Search terms..."
            style={{

              §{g.section}

        ))}
      </Card>
    </div>
  );
}

  // ── Custom SVG bubble chart with log-scale X ──
  const BubbleChart = () => {
    const W = 540, H = 300;
    const pad = { l: 68, r: 24, t: 20, b: 48 };
    const pw = W - pad.l - pad.r, ph = H - pad.t - pad.b;

    // X = log10(total revenue $M), Y = est. RS revenue $M, bubble = personnel K
    const xMin = Math.log10(100), xMax = Math.log10(16000);
    const yMax = 320, pMax = 75;
    const xs = v => pad.l + (Math.log10(v) - xMin) / (xMax - xMin) * pw;
    const ys = v => pad.t + ph - (v / yMax) * ph;
    const rs = v => 7 + Math.sqrt(v / pMax) * 28;

    const xTicks = [120, 300, 800, 2000, 5000, 14000];
    const yTicks = [0, 100, 200, 300];

    const [hovered, setHovered] = React.useState(null);

    return (
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', overflow: 'visible' }}>
        {/* grid */}
        {yTicks.map(v => (
          <g key={v}>
            <line x1={pad.l} x2={pad.l + pw} y1={ys(v)} y2={ys(v)} stroke="#f1f5f9" strokeWidth={1} />

        <line x1={pad.l} x2={pad.l} y1={pad.t} y2={pad.t + ph} stroke="#e2e8f0" strokeWidth={1} />
        {/* axis labels */}
        <text x={pad.l + pw / 2} y={H - 2} textAnchor="middle" fontSize={10} fill="#64748b">Total Firm Revenue (log scale)</text>
        <text x={10} y={pad.t + ph / 2} textAnchor="middle" fontSize={10} fill="#64748b" transform={`rotate(-90, 10, ${pad.t + ph / 2})`}>Est. RS Revenue ($M)</text>

                </g>
              )}
            </g>
          );
        })}
        {/* bubble size legend — upper-left, where chart is clear */}
        <text x={pad.l + 10} y={pad.t + 12} fontSize={9} fill="#94a3b8" fontWeight={600}>bubble = personnel</text>
        {[[0.6,'~600'], [3.5,'~3.5K'], [30,'~30K']].map(([p, label], i) => {

    { name: 'Stantec',           url: 'https://www.stantec.com/en/services/environmental-services',                   focus: 'Infrastructure, Environment, Utilities',rsDepth: 3, ecoExpertise: 4, regFluency: 4, scale: 5, techInvest: 3, overlap: 'High',   notes: 'Strong environmental practice; growing RS capability. Direct competitor on FERC, habitat, and wetland work.' },
    { name: 'Tetra Tech',        url: 'https://www.tetratech.com/',                                                    focus: 'Federal, Water, Environment',          rsDepth: 3, ecoExpertise: 3, regFluency: 4, scale: 5, techInvest: 3, overlap: 'High',   notes: 'Federal-heavy; competes directly on USFWS, EPA, and Army Corps contracts. RS capability variable by office.' },

          return (
            <g key={i} onMouseEnter={() => setHov(row.name)} onMouseLeave={() => setHov(null)} style={{ cursor: 'default' }}>
              <text x={labelW-8} y={y+rH/2+4} textAnchor="end"

  const moduleLabel = { bizdev: 'Business Dev', market: 'Market Intel', technical: 'Technical Ref' }[currentModule];
  return (
    <nav style={{ position: 'sticky', top: 64, maxHeight: 'calc(100vh - 80px)', overflowY: 'auto', borderRight: '1px solid #e0e0e0' }}>
      <div style={{ padding: '0.6rem', fontSize: '0.875rem', fontWeight: 600, color: '#38393b', background: '#dbeff4', letterSpacing: 0.2 }}>
        {moduleLabel}
      </div>
      {sections.map(s => (
        <a key={s.id} href={`#${s.id}`}
          className={`toc-link ${activeSection === s.id ? 'active' : ''}`}>
          <span style={{ color: '#aaa', marginRight: 7, fontSize: 12 }}>{s.id === firstId ? '' : `${s.num}.`}</span>
          {s.label}
        </a>
      ))}
    </nav>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [currentModule, setCurrentModule] = React.useState('bizdev');
  const [activeSection, setActiveSection] = React.useState('sec-0');

  // Reset scroll + active section when switching modules
  const switchModule = (modId) => {
    setCurrentModule(modId);
    const firstId = MODULE_SECTIONS[modId][0].id;
    setActiveSection(firstId);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  // Scroll spy — re-runs when currentModule changes so observer attaches to new section IDs
  React.useEffect(() => {
    const ids = MODULE_SECTIONS[currentModule].map(s => s.id);
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) setActiveSection(entry.target.id);
      });
    }, { rootMargin: '-20% 0px -70% 0px' });
    ids.forEach(id => { const el = document.getElementById(id); if (el) observer.observe(el); });
    return () => observer.disconnect();
  }, [currentModule]);

  const footerLabel = {
    technical: 'Technical Reference & Field Guide',
    bizdev:    'Business Development & Outreach',
    market:    'Market & Competitive Intelligence',
  }[currentModule];

  return (
    <div>
      {/* Header */}
      <header style={{
        position: 'sticky', top: 0, zIndex: 40, background: '#004562',
        padding: '12px 32px', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        boxShadow: '0 2px 8px rgba(0,0,0,0.3)',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
          <span style={{ display: 'inline-block', height: 40 }} dangerouslySetInnerHTML={{ __html: '<svg height="40" viewBox="0 0 432 257" width="67" xmlns="http://www.w3.org/2000/svg"><g fill="none"><path d="m114.6 2.44h-114.6v114.56c5.90988984-60.6685706 53.92937-108.67128998 114.6-114.56z" fill="#aeafb2"/><path d="m139.21 256.23h114.59v-114.58c-5.900103 60.672983-53.916502 108.685192-114.59 114.58z" fill="#aeafb2"/><path d="m164.3 107h12.34v-101.82h-12.34v-2.74h89.5v30.33h-2.8v-2.12c0-13.88-10.21-25.47-28.35-25.47h-22.22v46.66h10.57c9.9 0 15.09-5.64 15.09-20.13v-1.71h2.74v48.21h-2.74v-3.51c0-10.83-5.19-20.12-15.09-20.12h-10.57v52.42h22c25 0 28.65-20.74 28.65-29.44v-2.1h2.76v34.32h-89.54zm100.31-37.63h2.74c3.66 17.23 15.24 40.09 35.82 40.09 13.12 0 21.95-8.07 21.95-21.49 0-33.24-60.82-9.29-60.82-55.2 0-20.13 13.41-32.77 33.53-32.77 15.41 0 20.29 8.22 27.17 8.22 4.58 0 4.89-4 4.89-5.93h2.75v34.3h-2.75c-3.81-16.17-12.35-33.85-31.57-33.85-11.6 0-20.32 7.78-20.32 19.52 0 29.43 61.76 6.25 61.76 51.53 0 23.78-13.42 38.42-34.92 38.42-13.26 0-25.76-7.92-31.86-7.92-4.12 0-5.64 2.74-5.64 5.64h-2.74zm69.05 37.63h2c5.79-.45 8.55-4.12 10.38-9.16l35.34-97.84h2.3l40.86 107h7.46v2.75h-45.43v-2.75h12.18l-11.11-31.69h-29.58l-7.32 21.5c-.623698 1.4517093-.985935 3.0022191-1.07 4.58 0 5 4.27 5.64 7.33 5.64h4.26v2.75h-27.6zm52.75-34.46-13.26-38.54h-.3l-13.57 38.57z" fill="#f9a134"/></g></svg>' }} />
          <div style={{ width: 1, height: 32, background: 'rgba(255,255,255,0.2)' }} />
          <div>
            <div style={{ fontSize: 20, fontWeight: 600, color: '#fff', lineHeight: 1.2 }}>Remote Sensing & Random Forest</div>
            <div style={{ display: 'flex', gap: 6, marginTop: 5 }}>
              {MODULES.map(m => (
                <button key={m.id} onClick={() => switchModule(m.id)} style={{
                  padding: '3px 13px', borderRadius: 20, fontSize: 12, cursor: 'pointer',
                  fontFamily: 'inherit', fontWeight: currentModule === m.id ? 600 : 400,
                  background: currentModule === m.id ? '#1193BA' : 'transparent',
                  color: currentModule === m.id ? '#fff' : '#66CAD8',
                  border: `1px solid ${currentModule === m.id ? '#1193BA' : 'rgba(102,202,216,0.45)'}`,
                  transition: 'all 0.18s',
                }}>{m.label}</button>
              ))}
            </div>
          </div>
        </div>
        <div style={{ fontSize: 14, color: '#66CAD8' }}>ESA Environmental Science Associates</div>
      </header>

      {/* Main layout */}
      <div style={{ display: 'flex', maxWidth: 1600, margin: '0 auto' }}>
        {/* Sidebar */}
        <aside style={{ width: 260, flexShrink: 0, background: '#fff', borderRight: '1px solid #e0e0e0', minHeight: 'calc(100vh - 64px)' }}>
          <TOCSidebar activeSection={activeSection} currentModule={currentModule} />
        </aside>

        {/* Content */}
        <main style={{ flex: 1, padding: '32px 48px', maxWidth: 1200, background: '#fff' }}>
          {currentModule === 'technical' && <>
            <Section0 /><Section1 /><Section2 /><Section3 /><Section4 />
            <Section5 /><Section6 /><Section7 /><Section8 /><Section9 />
            <Section10 /><Section11 /><Section12 /><Section13 />
          </>}
          {currentModule === 'bizdev' && <>
            <BizSection0 /><BizSection1 /><BizSection2 />
            <BizSection3 /><BizSection4 /><BizSection5 />
          </>}
          {currentModule === 'market' && <>
            <MktSection0 /><MktSection1 /><MktSection2 />
            <MktSection3 /><MktSection4 />
          </>}

          {/* Footer */}
          <div style={{ textAlign: 'center', padding: '40px 0 24px', fontSize: 13, color: '#aaa', borderTop: '1px solid #e0e0e0', marginTop: 40 }}>
            ESA Remote Sensing &amp; Random Forest — {footerLabel}
          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
