// Index definitions
const INDEX_DEFS = {
  'NDVI':  { formula: '(NIR - Red) / (NIR + Red)', bands: ['NIR', 'Red'], calc: (b) => (b.NIR - b.Red) / (b.NIR + b.Red + 0.0001), desc: 'General greenness/vigor. Saturates in dense canopy.', bestFor: 'Quick vegetation assessment', limitations: 'Saturates in dense canopy, sensitive to soil background' },
  'EVI':   { formula: '2.5 * (NIR - Red) / (NIR + 6*Red - 7.5*Blue + 1)', bands: ['NIR', 'Red', 'Blue'], calc: (b) => 2.5 * (b.NIR - b.Red) / (b.NIR + 6*b.Red - 7.5*b.Blue + 1), desc: 'Enhanced veg index. Corrects for atmosphere & soil.', bestFor: 'Dense canopy, atmospheric correction', limitations: 'Requires blue band' },
  'EVI2':  { formula: '2.5 * (NIR - Red) / (NIR + 2.4*Red + 1)', bands: ['NIR', 'Red'], calc: (b) => 2.5 * (b.NIR - b.Red) / (b.NIR + 2.4*b.Red + 1), desc: '2-band EVI. No blue band needed.', bestFor: 'Dense canopy without blue band', limitations: 'Less atmospheric correction than EVI' },
  'SAVI':  { formula: '((NIR - Red) / (NIR + Red + 0.5)) * 1.5', bands: ['NIR', 'Red'], calc: (b) => ((b.NIR - b.Red) / (b.NIR + b.Red + 0.5)) * 1.5, desc: 'Greenness corrected for soil background.', bestFor: 'Sparse vegetation, arid/semi-arid areas', limitations: 'Requires L factor tuning' },
  'MSAVI2': { formula: '(2*NIR + 1 - sqrt((2*NIR+1)^2 - 8*(NIR-Red))) / 2', bands: ['NIR', 'Red'], calc: (b) => (2*b.NIR + 1 - Math.sqrt(Math.max(0, Math.pow(2*b.NIR+1, 2) - 8*(b.NIR-b.Red)))) / 2, desc: 'Self-adjusting soil correction.', bestFor: 'Variable canopy density', limitations: 'More complex computation' },
  'NDMI':  { formula: '(NIR - SWIR1) / (NIR + SWIR1)', bands: ['NIR', 'SWIR1'], calc: (b) => (b.NIR - b.SWIR1) / (b.NIR + b.SWIR1 + 0.0001), desc: 'Canopy moisture content.', bestFor: 'Drought/stress monitoring, wetlands', limitations: 'Needs SWIR band (20m on S2)' },
  'NBR':   { formula: '(NIR - SWIR2) / (NIR + SWIR2)', bands: ['NIR', 'SWIR2'], calc: (b) => (b.NIR - b.SWIR2) / (b.NIR + b.SWIR2 + 0.0001), desc: 'Burn severity / major disturbance.', bestFor: 'Fire damage assessment', limitations: 'Needs SWIR2 band' },
  'NDWI':  { formula: '(Green - NIR) / (Green + NIR)', bands: ['Green', 'NIR'], calc: (b) => (b.Green - b.NIR) / (b.Green + b.NIR + 0.0001), desc: 'Open water detection.', bestFor: 'Water body mapping, flood extent', limitations: 'Can confuse shadows with water' },
  'NDRE':  { formula: '(RedEdge - Red) / (RedEdge + Red)', bands: ['RedEdge', 'Red'], calc: (b) => ((b.RedEdge||0.12) - b.Red) / ((b.RedEdge||0.12) + b.Red + 0.0001), desc: 'More chlorophyll-sensitive than NDVI at moderate-high canopy densities; uses the Red Edge transition zone.', bestFor: 'Canopy chlorophyll content, plant health (Sentinel-2 B5/B4)', limitations: 'Requires Red Edge band, Sentinel-2, RapidEye, or similar. Not available on Landsat or NAIP.' },
  'BSI':   { formula: '(SWIR1 + Red − NIR − Blue) / (SWIR1 + Red + NIR + Blue)', bands: ['SWIR1', 'Red', 'NIR', 'Blue'], calc: (b) => (b.SWIR1 + b.Red - b.NIR - b.Blue) / (b.SWIR1 + b.Red + b.NIR + b.Blue + 0.0001), desc: 'Highlights exposed mineral soil. High BSI = disturbed/bare ground; low BSI = vegetated or wet.', bestFor: 'Construction monitoring, erosion mapping, post-disturbance bare ground tracking', limitations: 'Sparse desert shrubland can mimic bare soil; verify with field data' },
  'PSRI':  { formula: '(Red − Green) / RedEdge', bands: ['Red', 'Green', 'RedEdge'], calc: (b) => (b.Red - b.Green) / ((b.RedEdge||0.12) + 0.0001), desc: 'Carotenoid:chlorophyll ratio proxy. Rises during senescence as chlorophyll breaks down and carotenoids dominate.', bestFor: 'Senescence timing, fall phenology mapping, drought/stress-induced early aging detection', limitations: 'Requires Red Edge band; range varies strongly across cover types, use relative not absolute thresholds' },

// Glossary entries
const GLOSSARY = [
  { term: 'Bootstrap', def: 'A random sample drawn with replacement from training data. Each RF tree trains on a different bootstrap sample (~63% of data), introducing diversity.', cat: 'RF Model', section: 5 },
  { term: 'CHM (Canopy Height Model)', def: 'DSM minus DEM. Represents vegetation height above ground. Derived from LiDAR.', cat: 'Bands', section: 4 },
  { term: 'DEM / DSM / DTM', def: 'DEM = bare earth elevation. DSM = top of everything (canopy, buildings). DTM = bare earth with breaklines. CHM = DSM minus DEM.', cat: 'Bands', section: 2 },
  { term: 'Entropy', def: 'Measure of disorder at a decision tree node. High entropy = mixed classes; low entropy = one class dominates. Trees split to reduce entropy.', cat: 'RF Model', section: 5 },
  { term: 'EVI / EVI2', def: 'Enhanced Vegetation Index. Corrects for atmosphere & soil. EVI needs blue band; EVI2 is a 2-band version that does not.', cat: 'Indices', section: 3 },
  { term: 'F1 Score', def: 'Harmonic mean of precision and recall. Balances both into a single class-level metric. F1 = 2 * (P * R) / (P + R).', cat: 'Accuracy', section: 7 },
  { term: 'Feature Importance', def: 'Ranking of which predictor layers contribute most to model accuracy. Used to identify valuable RS inputs and prune irrelevant ones.', cat: 'RF Model', section: 8 },
  { term: 'GLCM Texture', def: 'Gray-Level Co-occurrence Matrix. Quantifies spatial patterns like homogeneity, contrast, and entropy within an image window.', cat: 'Indices', section: 4 },
  { term: 'Kappa', def: 'Accuracy metric adjusted for chance agreement. 0 = random, 1 = perfect. >0.8 is strong. Useful when classes are imbalanced.', cat: 'Accuracy', section: 7 },
  { term: 'MDI (Gini Importance)', def: 'Mean Decrease in Impurity. How much each feature reduces impurity across all tree splits. Fast but biased toward continuous features.', cat: 'RF Model', section: 8 },
  { term: 'MDA (Permutation Importance)', def: 'Mean Decrease in Accuracy. Drop in accuracy when a feature is shuffled. More reliable than MDI, slower. Preferred for reporting.', cat: 'RF Model', section: 8 },
  { term: 'NDMI', def: 'Normalized Difference Moisture Index. (NIR - SWIR1) / (NIR + SWIR1). Detects canopy/vegetation moisture content.', cat: 'Indices', section: 3 },
  { term: 'NDVI', def: 'Normalized Difference Vegetation Index. (NIR - Red) / (NIR + Red). Most common vegetation index. Measures general greenness.', cat: 'Indices', section: 3 },
  { term: 'NDWI', def: 'Normalized Difference Water Index. (Green - NIR) / (Green + NIR). Detects open water bodies.', cat: 'Indices', section: 3 },
  { term: 'NIR (Near-Infrared)', def: 'Electromagnetic radiation ~750-1000nm. Healthy vegetation is highly reflective in NIR. Foundation of most vegetation indices.', cat: 'Bands', section: 1 },
  { term: 'OOB (Out-of-Bag)', def: 'The ~37% of training samples not selected by a bootstrap draw. Used as built-in validation without needing a separate holdout set.', cat: 'RF Model', section: 5 },
  { term: 'Overfitting', def: 'When the model learns noise rather than signal. Great on training data, poor on new data. Controlled by depth limits, leaf size, and tree count.', cat: 'RF Model', section: 6 },
  { term: 'Precision (User\'s Accuracy)', def: 'Of everything we predicted as class X, what fraction truly is X? High precision = few false positives. "When the model says it, you can trust it."', cat: 'Accuracy', section: 7 },
  { term: 'Recall (Producer\'s Accuracy)', def: 'Of all actual class X samples, what fraction did we detect? High recall = few false negatives. "The model doesn\'t miss much."', cat: 'Accuracy', section: 7 },
  { term: 'Red Edge', def: 'Transition zone ~680-750nm where vegetation reflectance changes rapidly. Sentinel-2 has 3 red edge bands (B5, B6, B7). Sensitive to chlorophyll.', cat: 'Bands', section: 1 },
  { term: 'SWIR (Shortwave Infrared)', def: 'Electromagnetic radiation ~1.0-2.5 microns. Sensitive to moisture content. Sentinel-2 bands B11 (1610nm) and B12 (2190nm).', cat: 'Bands', section: 1 },
];

// ============================================================
// REUSABLE COMPONENTS
// ============================================================

function SectionTitle({ children, id }) {
  return <h3 id={id} className="methods-section section-heading">{children}</h3>;
}

function SubHeading({ children }) {
  return <h4 className="sub-heading">{children}</h4>;
}

function Card({ children, className = '' }) {
  return <div className={`card prose ${className}`}>{children}</div>;
}

function Formula({ children }) {
  return <div className="formula-block">{children}</div>;
}

function StatCard({ label, value, sub }) {
  return (
    <div className="stat-card">
      <div className="stat-value">{value}</div>
      <div className="stat-label">{label}</div>
      {sub && <div className="stat-sub">{sub}</div>}
    </div>
  );
}

function MTable({ headers, rows }) {
  return (
    <div style={{ overflowX: 'auto', margin: '12px 0' }}>
      <table className="mtable">
        <thead><tr>{headers.map((h, i) => <th key={i}>{h}</th>)}</tr></thead>
        <tbody>{rows.map((row, ri) => (
          <tr key={ri}>{row.map((cell, ci) => <td key={ci}>{cell}</td>)}</tr>
        ))}</tbody>
      </table>
    </div>
  );
}

function SliderRow({ label, value, onChange, min, max, step = 0.01 }) {
  return (
    <div className="slider-row" style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 12 }}>
      <label style={{ fontSize: 16, width: 120, color: '#64748b', flexShrink: 0 }}>{label}</label>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={e => onChange(parseFloat(e.target.value))}
        style={{ flex: 1, height: 8 }} />
      <span style={{ fontSize: 16, width: 60, textAlign: 'right', fontFamily: 'monospace', color: '#334155' }}>
        {typeof value === 'number' ? value.toFixed(2) : value}
      </span>
    </div>
  );
}

function ToggleButton({ label, active, onClick }) {
  return <button className={`toggle-btn ${active ? 'active' : ''}`} onClick={onClick}>{label}</button>;
}

function ChartCard({ title, children, height }) {
  return (
    <div style={{ background: '#f1f5f9', borderRadius: 8, padding: '12px 16px', marginBottom: 16 }}>
      {title && <div style={{ fontSize: 16, fontWeight: 600, color: '#64748b', marginBottom: 8 }}>{title}</div>}
      {children}
    </div>
  );
}

// ============================================================
// SECTION 1: EM Spectrum & RS Fundamentals
// ============================================================
function Section1() {
  const [activeSensors, setActiveSensors] = React.useState({ 'Sentinel-2': true });
  const [activeSigs, setActiveSigs] = React.useState({ 'Conifer Forest': true, 'Deciduous Forest': true, 'Water': true, 'Bare Soil': true });

  const toggleSensor = (s) => setActiveSensors(prev => ({ ...prev, [s]: !prev[s] }));
  const toggleSig = (s) => setActiveSigs(prev => ({ ...prev, [s]: !prev[s] }));

  // Build spectrum chart data
  const spectrumData = [];
  for (let wl = 400; wl <= 2400; wl += 10) {
    const point = { wl };
    SPECTRUM_REGIONS.forEach(r => {
      point[r.name] = (wl >= r.start && wl <= r.end) ? 1 : 0;
    });
    spectrumData.push(point);
  }

  // Build spectral signature data
  const sigData = SPECTRAL_SIGS.wavelengths.map((wl, i) => {
    const point = { wl: wl + 'nm' };
    Object.entries(SPECTRAL_SIGS.types).forEach(([name, { values }]) => {
      point[name] = values[i];
    });
    return point;
  });

  const bandCards = [
    { name: 'Blue', range: '450-520 nm', detects: 'Atmosphere, water depth', use: 'Coastal/bathymetric mapping', color: '#3b82f6' },
    { name: 'Green', range: '520-600 nm', detects: 'Vegetation reflectance peak', use: 'Water quality, general mapping', color: '#22c55e' },
    { name: 'Red', range: '600-690 nm', detects: 'Chlorophyll absorption', use: 'Vegetation health, species ID', color: '#ef4444' },
    { name: 'Red Edge', range: '690-750 nm', detects: 'Chlorophyll transition zone', use: 'Plant stress, species distinction', color: '#f97316' },
    { name: 'NIR', range: '750-1000 nm', detects: 'Cell structure, biomass', use: 'Vegetation indices, land/water', color: '#a855f7' },
    { name: 'SWIR-1', range: '1500-1750 nm', detects: 'Leaf/soil moisture', use: 'Wetlands, drought stress, snow/ice mapping', color: '#ec4899' },
    { name: 'SWIR-2', range: '2000-2350 nm', detects: 'Water in leaves, minerals', use: 'Burn severity, geology', color: '#f43f5e' },
  ];

  return (
    <div>
      <SectionTitle id="sec-1">1. The Electromagnetic Spectrum & Remote Sensing Fundamentals</SectionTitle>

      <Card>
        <p><strong>Remote sensing</strong> is the science of acquiring information about the Earth's surface without physical contact. Satellites and aircraft carry sensors that measure reflected and emitted electromagnetic energy across different wavelengths. By analyzing how different materials on the ground reflect light at different wavelengths, we can identify and map land cover types, vegetation health, water bodies, and more.</p>
        <p>The key insight is that different materials have different <strong>spectral signatures</strong>: they reflect different amounts of light at different wavelengths. A healthy forest reflects very differently from bare soil or water. We exploit these differences by collecting data in multiple <strong>spectral bands</strong> (discrete wavelength ranges tuned to capture specific surface properties).</p>
      </Card>

      <Card>
        <SubHeading>Electromagnetic Spectrum: Where Satellite Bands Fall</SubHeading>
        <p>Toggle sensors below to see where their bands sit on the spectrum. Each colored region represents a wavelength range that captures different information about the Earth's surface.</p>

        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 16 }}>
          {Object.keys(SENSOR_BANDS).map(s => (
            <button key={s} onClick={() => toggleSensor(s)}
              style={{
                padding: '8px 18px', borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: 'pointer',
                transition: 'all 0.15s',
                background: activeSensors[s] ? SENSOR_COLORS[s] : '#f3f4f6',
                color: activeSensors[s] ? '#fff' : '#6b7280',
                border: `2px solid ${activeSensors[s] ? SENSOR_COLORS[s] : '#d1d5db'}`,
              }}>
              {s}
            </button>
          ))}
        </div>

        {/* Spectrum visualization */}
        <div style={{ position: 'relative', background: '#f1f5f9', borderRadius: 8, padding: '20px 20px 16px', overflowX: 'auto' }}>

          {/* Spectrum region labels row */}
          <div style={{ position: 'relative', height: 44, marginBottom: 4 }}>
            {SPECTRUM_REGIONS.map(r => {
              const totalRange = 2400 - 400;
              const left = ((r.start - 400) / totalRange) * 100;
              const width = ((r.end - r.start) / totalRange) * 100;
              return (
                <div key={r.name} style={{
                  position: 'absolute', left: left + '%', width: width + '%', top: 0, height: '100%',
                  background: r.color, opacity: 0.8, borderRadius: 6,
                }} title={`${r.name}: ${r.start}-${r.end}nm, ${r.desc}`}>
                  <span style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%,-50%)',
                    fontSize: 13, fontWeight: 700, color: '#fff', whiteSpace: 'nowrap', textShadow: '0 1px 3px rgba(0,0,0,0.5)' }}>{r.label}</span>
                </div>
              );
            })}
          </div>

          {/* Sensor bands overlay area */}
          {(() => {
            const activeSensorList = Object.entries(SENSOR_BANDS).filter(([s]) => activeSensors[s]);
            const bandAreaHeight = Math.max(60, activeSensorList.length * 22 + 8);
            return (
              <div style={{ position: 'relative', height: bandAreaHeight, marginBottom: 8 }}>
                {activeSensorList.map(([sensor, bands], si) => (
                  bands.filter(b => b.center <= 2400).map((b, bi) => {
                    const totalRange = 2400 - 400;
                    const left = ((b.center - b.width/2 - 400) / totalRange) * 100;
                    const width = (b.width / totalRange) * 100;
                    return (
                      <div key={`${sensor}-${bi}`} style={{
                        position: 'absolute', left: Math.max(0, left) + '%', width: Math.max(0.8, width) + '%',
                        top: si * 22 + 4, height: 16,
                        background: SENSOR_COLORS[sensor], borderRadius: 4, opacity: 0.85,
                        cursor: 'default',
                      }} title={`${sensor} ${b.name}: ${b.center}nm (${b.res})`} />
                    );
                  })
                ))}
              </div>
            );
          })()}

          {/* Wavelength axis line + labels */}
          <div style={{ borderTop: '1px solid #e2e8f0', paddingTop: 8, position: 'relative', height: 24 }}>
            {[400, 600, 800, 1000, 1200, 1400, 1600, 1800, 2000, 2200, 2400].map(wl => (
              <span key={wl} style={{
                position: 'absolute', left: ((wl - 400) / 2000 * 100) + '%', transform: 'translateX(-50%)',
                fontSize: 14, color: '#64748b',
              }}>{wl}</span>
            ))}
          </div>
          <div style={{ textAlign: 'center', fontSize: 14, color: '#94a3b8', marginTop: 8 }}>Wavelength (nm)</div>

        </div>
      </Card>

      <Card>
        <SubHeading>Spectral Signature Explorer</SubHeading>
        <p>Different land cover types reflect light differently at each wavelength. Toggle cover types below to compare their spectral signatures. Notice how vegetation is bright in NIR but dark in red (chlorophyll absorbs red light), while water absorbs almost everything beyond visible wavelengths.</p>

        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 16 }}>
          {Object.entries(SPECTRAL_SIGS.types).map(([name, { color }]) => (
            <button key={name} onClick={() => toggleSig(name)}
              style={{
                padding: '8px 18px', borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: 'pointer',
                transition: 'all 0.15s',
                background: activeSigs[name] ? color : '#f3f4f6',
                color: activeSigs[name] ? '#fff' : '#6b7280',
                border: `2px solid ${activeSigs[name] ? color : '#d1d5db'}`,
              }}>
              {name}
            </button>
          ))}
        </div>

        <ResponsiveContainer width="100%" height={440}>
          <LineChart data={sigData} margin={{ top: 55, right: 20, left: 10, bottom: 35 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" opacity={0.3} />
            <XAxis dataKey="wl" tick={{ fontSize: 14 }}
              label={{ value: 'Wavelength', position: 'bottom', offset: 5, fontSize: 14, fill: '#94a3b8' }} />
            <YAxis tick={{ fontSize: 14 }} domain={[0, 0.55]}
              label={{ value: 'Reflectance', angle: -90, position: 'insideLeft', offset: 10, fontSize: 14, fill: '#94a3b8' }} />
            <Tooltip contentStyle={{ background: '#ffffff', border: '1px solid #475569', borderRadius: 8 }} />
            {Object.entries(SPECTRAL_SIGS.types).filter(([name]) => activeSigs[name]).map(([name, { color }]) => (
              <Line key={name} type="monotone" dataKey={name} stroke={color} strokeWidth={2} dot={{ r: 4, fill: color }} />
            ))}
            {/* Reference lines for every spectral region */}
            {/* Row A (dy:-8): Blue, Red, NIR, SWIR-1, every-other slot to avoid collision */}
            <ReferenceLine x="450nm"  stroke="#3b82f6" strokeDasharray="3 3" label={{ value: 'Blue',   fontSize: 12, fill: '#3b82f6', position: 'top', dy: -8  }} />
            <ReferenceLine x="650nm"  stroke="#ef4444" strokeDasharray="3 3" label={{ value: 'Red',    fontSize: 12, fill: '#ef4444', position: 'top', dy: -8  }} />
            <ReferenceLine x="850nm"  stroke="#a855f7" strokeDasharray="3 3" label={{ value: 'NIR',    fontSize: 12, fill: '#a855f7', position: 'top', dy: -8  }} />
            <ReferenceLine x="1600nm" stroke="#ec4899" strokeDasharray="3 3" label={{ value: 'SWIR-1', fontSize: 12, fill: '#ec4899', position: 'top', dy: -8  }} />
            {/* Row B (dy:-26): Green, RE, SWIR-2, offset row so adjacent labels are on different heights */}
            <ReferenceLine x="550nm"  stroke="#22c55e" strokeDasharray="3 3" label={{ value: 'Green',  fontSize: 12, fill: '#22c55e', position: 'top', dy: -26 }} />
            <ReferenceLine x="700nm"  stroke="#f97316" strokeDasharray="3 3" label={{ value: 'RE',     fontSize: 12, fill: '#f97316', position: 'top', dy: -26 }} />
            <ReferenceLine x="2200nm" stroke="#f43f5e" strokeDasharray="3 3" label={{ value: 'SWIR-2', fontSize: 12, fill: '#f43f5e', position: 'top', dy: -26 }} />
          </LineChart>
        </ResponsiveContainer>
      </Card>

      <Card>
        <SubHeading>Band Quick Reference</SubHeading>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 12 }}>
          {bandCards.map(b => (
            <div key={b.name} style={{ background: '#f1f5f9', borderRadius: 8, padding: 16, borderLeft: `3px solid ${b.color}` }}>
              <div style={{ fontSize: 18, fontWeight: 700, color: b.color, marginBottom: 4 }}>{b.name}</div>
              <div style={{ fontSize: 15, color: '#94a3b8', marginBottom: 6 }}>{b.range}</div>
              <div style={{ fontSize: 16, color: '#334155', marginBottom: 4 }}><strong>Detects:</strong> {b.detects}</div>
              <div style={{ fontSize: 15, color: '#64748b' }}><strong>ESA Use:</strong> {b.use}</div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

    { name: 'NAIP', res: '0.6-1m', revisit: '2-3 year cycle', bands: 4, cost: 'Free (US)', avail: 'US only, 2003+', use: 'High-res base imagery; urban/rural detail', free: true, highRes: true, weekly: false },
    { name: 'Planet', res: '3-5m', revisit: 'Daily', bands: 4, cost: 'Commercial', avail: 'Global, 2016+', use: 'High cadence change detection; monitoring', free: false, highRes: true, weekly: true },
    { name: 'LiDAR', res: 'Sub-meter', revisit: 'One-time collects', bands: 1, cost: 'Varies', avail: 'State portals, USGS', use: 'Canopy height, terrain, structure under canopy', free: false, highRes: true, weekly: false },
  ];

  const filteredTable = sensorTable.filter(s => {
    if (filters.free && !s.free) return false;
    if (filters.highRes && !s.highRes) return false;
    if (filters.weekly && !s.weekly) return false;
    return true;
  });

  return (
    <div>
      <SectionTitle id="sec-2">2. Satellite & Ancillary Data Sources</SectionTitle>

      <Card>
        <p>Choosing the right data source is one of the most consequential decisions in any RS project. Each sensor platform offers different tradeoffs between <strong>spatial resolution</strong> (how small a feature you can see), <strong>temporal resolution</strong> (how often you get new imagery), <strong>spectral resolution</strong> (how many wavelength bands), and <strong>cost</strong>. There is no single best sensor, the right choice depends on your project's requirements.</p>
      </Card>

      <Card>
        <SubHeading>Resolution vs. Revisit Tradeoff</SubHeading>
        <p>Higher spatial resolution generally means less frequent coverage or higher cost. Bubble size = spectral band count. Planet is the commercial outlier — fine resolution <em>and</em> daily cadence. LiDAR is excluded here; it's project-acquired on demand, not a time-series sensor.</p>

        <ResponsiveContainer width="100%" height={400}>
          <ScatterChart margin={{ top: 30, right: 60, left: 10, bottom: 40 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" opacity={0.3} />
            <XAxis type="number" dataKey="x" name="Resolution" tick={{ fontSize: 14 }} scale="log" domain={[0.1, 100]}
              label={{ value: 'Spatial Resolution (m, log scale)', position: 'bottom', offset: 5, fontSize: 14, fill: '#94a3b8' }} />
            <YAxis type="number" dataKey="y" name="Revisit Frequency" tick={{ fontSize: 14 }} scale="log" domain={[0.1, 1000]}
              label={{ value: 'Revisit Frequency (captures/year, log scale)', angle: -90, position: 'insideLeft', offset: 10, fontSize: 14, fill: '#94a3b8' }} />
            <ZAxis type="number" dataKey="z" range={[40, 1800]} name="Bands" />
            <Tooltip contentStyle={{ background: '#ffffff', border: '1px solid #475569', borderRadius: 8 }}
              formatter={(val, name) => [val, name]} />
            {SENSOR_SCATTER_DATA.map((s, i) => (
              <Scatter key={i} name={s.name} data={[s]} fill={s.color}>
                <LabelList dataKey="name" position="top" style={{ fontSize: 14, fill: '#334155', fontWeight: 600 }} />
              </Scatter>
            ))}
          </ScatterChart>
        </ResponsiveContainer>
      </Card>

      <Card>
        <SubHeading>Sensor Decision Matrix</SubHeading>
        <p>Use the filters below to narrow down which sensors meet your project requirements.</p>

        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 16 }}>
          <ToggleButton label="Free Only" active={filters.free} onClick={() => setFilters(f => ({...f, free: !f.free}))} />
          <ToggleButton label="Sub-5m Resolution" active={filters.highRes} onClick={() => setFilters(f => ({...f, highRes: !f.highRes}))} />
          <ToggleButton label="Weekly Revisit" active={filters.weekly} onClick={() => setFilters(f => ({...f, weekly: !f.weekly}))} />
        </div>

        <MTable
          headers={['Sensor', 'Resolution', 'Revisit', 'Bands', 'Cost', 'Best For']}
          rows={filteredTable.map(s => [
            s.name, s.res, s.revisit, s.bands, s.cost, s.use
          ])}
        />

        {filteredTable.length === 0 && (
          <p style={{ color: '#f97316', fontSize: 16, textAlign: 'center', marginTop: 12 }}>No sensors match all selected filters. Try removing a filter.</p>
        )}
      </Card>

      <Card>
        <SubHeading>LiDAR & Elevation Products</SubHeading>
        <p>LiDAR (Light Detection and Ranging) fires laser pulses from an aircraft and measures the time for each pulse to return. Because pulses penetrate canopy gaps, LiDAR captures both the top of vegetation (first return) and the bare ground beneath (last return / ground return), something optical imagery cannot do.</p>

        {/* Cross-section diagram */}
        <div style={{ background: '#f1f5f9', borderRadius: 8, padding: 24, margin: '16px 0' }}>
          <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
            {[
              { name: 'DSM', desc: 'Digital Surface Model', detail: 'Top of everything: canopy, buildings, ground', color: '#22c55e', height: 100 },
              { op: '−' },
              { name: 'DEM', desc: 'Digital Elevation Model', detail: 'Bare earth surface only', color: '#d4a373', height: 40 },
              { op: '=' },
              { name: 'CHM', desc: 'Canopy Height Model', detail: 'DSM minus DEM = vegetation height', color: '#1193BA', height: 60 },
            ].map((item, i) => item.op
              ? <div key={i} style={{ fontSize: 32, fontWeight: 300, color: '#94a3b8', lineHeight: 1, paddingBottom: 48 }}>{item.op}</div>
              : (
              <div key={item.name} style={{ textAlign: 'center', width: 160 }}>
                <div style={{ position: 'relative', height: 120, margin: '0 auto 12px', width: 120 }}>
                  <div style={{ position: 'absolute', bottom: 0, width: '100%', height: item.height, background: item.color, opacity: 0.3, borderRadius: '4px 4px 0 0' }} />
                </div>
                <div style={{ fontSize: 19, fontWeight: 700, color: item.color }}>{item.name}</div>
                <div style={{ fontSize: 15, color: '#64748b' }}>{item.desc}</div>
                <div style={{ fontSize: 14, color: '#94a3b8', marginTop: 4 }}>{item.detail}</div>
              </div>
            ))}
          </div>
          <Formula>{'CHM = DSM - DEM\n\nCanopy Height = (Top of canopy surface) - (Bare earth surface)\n\nExample: DSM at 45m elevation, DEM at 30m → CHM = 15m tree height'}</Formula>
        </div>
      </Card>

      <Card>
        <SubHeading>Atmospheric Correction: L1C vs. L2A</SubHeading>
        <p>Satellite sensors record <strong>Digital Numbers (DN)</strong> or <strong>Top-of-Atmosphere (TOA) reflectance</strong>. Atmospheric correction converts these to <strong>Bottom-of-Atmosphere (BOA) / surface reflectance</strong>, the actual ground-leaving signal. Using the wrong level is a common source of index threshold errors when comparing imagery across dates or sensors.</p>

        <MTable
          headers={['Level', 'What It Is', 'When to Use', 'ESA Context']}
          rows={[
            ['L1C / TOA', 'Radiance converted to reflectance at sensor. Includes atmospheric scattering and absorption.', 'Cloud masking, quick visual screening, or when comparing images from the same date/sensor.', 'Acceptable for single-date projects with no cross-date comparison. Avoid for multi-temporal index differencing.'],
            ['L2A / BOA (Surface)', 'Atmospherically corrected using Sen2Cor or similar. Removes path radiance, aerosol effects.', 'Any multi-temporal analysis, index thresholding, cross-sensor comparison, or quantitative mapping.', 'Required for all multi-date compositing, seasonal differencing, and change detection. ESA standard for deliverable products.'],
            ['Relative Normalization', 'Histogram matching or IR-MAD between scenes, no absolute correction. Makes images comparable to each other.', 'When L2A is unavailable or for drone/airborne data. Anchors one image to another.', 'Useful for normalizing NAIP or Planet scenes that lack formal atmospheric correction pipelines.'],
          ]}
        />

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginTop: 12 }}>
          <div style={{ background: '#fef3c7', borderRadius: 8, padding: 14, borderLeft: '3px solid #F9A134' }}>
            <div style={{ fontWeight: 700, color: '#92400e', marginBottom: 6 }}>⚠ Index Threshold Trap</div>
            <div style={{ fontSize: 14, color: '#78350f' }}>NDVI computed on L1C TOA will read 5–15% higher than the same scene at L2A. Any threshold you develop on one level will misclassify on the other. Always confirm your imagery processing level before applying thresholds or training RF models.</div>
          </div>
          <div style={{ background: '#f0fdf4', borderRadius: 8, padding: 14, borderLeft: '3px solid #22c55e' }}>
            <div style={{ fontWeight: 700, color: '#166534', marginBottom: 6 }}>✓ Sentinel-2 Best Practice</div>
            <div style={{ fontSize: 14, color: '#14532d' }}>Download L2A products directly from Copernicus Dataspace or Google Earth Engine (<code>ee.ImageCollection("COPERNICUS/S2_SR_HARMONIZED")</code>). Sen2Cor has been applied. For Landsat use Collection 2 Level-2 products, atmospheric correction is already applied.</div>
          </div>
        </div>
      </Card>

      <Card>
        <SubHeading>Cloud Masking &amp; Temporal Compositing</SubHeading>
        <p>A single acquisition over PNW or coastal environments is almost always partially clouded. Cloud masking removes contaminated pixels; temporal compositing stacks multiple acquisitions and selects or aggregates clean values to build a cloud-free image.</p>

        <MTable
          headers={['Step / Tool', 'Sentinel-2', 'Landsat 8/9', 'Notes']}
          rows={[
            ['Cloud mask band', 'SCL (Scene Classification Layer); Band 20. Classes 8/9/10/11 = cloud/shadow/cirrus/snow.', 'QA_PIXEL band, Bit 3 = cloud, Bit 4 = cloud shadow, Bit 5 = snow.', 'Always mask cloud shadow (often overlooked), shadow pixels have artificially depressed NIR and inflated NDWI.'],
            ['GEE / Python masking', 'Filter SCL != 8 AND != 9 AND != 10', 'Bitwise: (QA_PIXEL >> 3) & 1 == 0', 'Apply before any compositing or index computation.'],
            ['Median composite', 'Stack 5–20 scenes in a season window, take pixel-wise median.', 'Same approach, Landsat\'s longer archive enables longer windows.', 'Median is robust to remaining cloud artifacts. Loses temporal specificity, use for "representative" seasonal snapshot.'],
            ['Percentile composite', 'Green season: 25th percentile NIR (greener); Dry season: 75th percentile SWIR.', 'Same, useful for fire/drought analysis.', 'Percentile composites can emphasize specific phenological states better than median.'],
            ['Best-pixel / Greenest', 'Select pixel with highest NDVI per season.', 'Common in Google Earth Engine annual mosaics.', 'Biased toward peak-green pixels, avoid for water/soil mapping where you want less-vegetated conditions.'],
          ]}
        />

        <div style={{ background: '#f0f9ff', borderRadius: 8, padding: 14, marginTop: 12, fontSize: 14, color: '#0369a1' }}>
          <strong>Practical rule:</strong> For a PNW project, define a "summer window" (July 1 – Sept 15) to capture peak phenology with minimum cloud cover. In GEE: <code>.filterDate('2023-07-01','2023-09-15').filter(ee.Filter.lt('CLOUDY_PIXEL_PERCENTAGE', 20))</code>. After masking, a median of even 3–5 clean scenes is usually sufficient for RF training imagery.
        </div>
      </Card>

      <Card>
        <SubHeading>Mosaic &amp; Multi-Scene Management</SubHeading>
        <p>Large project areas frequently span multiple satellite tiles or acquisition dates. Inconsistent radiometry across scenes creates visible seams and can bias RF predictions, the model may learn scene identity rather than land cover.</p>

        <MTable
          headers={['Problem', 'Cause', 'Fix']}
          rows={[
            ['Visible seam lines', 'Adjacent scenes acquired on different dates or under different atmospheric conditions → different mean reflectance.', 'Relative radiometric normalization (histogram match secondary scene to reference scene). In ArcPro: Color Balance in Mosaic Dataset, or manual raster calculator matching.'],
            ['Edge NoData artifacts', 'Reprojection and resampling leave NoData fringes at tile edges that propagate into derivative layers.', 'Buffer AOI by 1–2 pixels before clipping. Use Expand/Shrink to fill single-pixel NoData gaps. Check with IsNull() in Raster Calculator.'],
            ['Inconsistent cell alignment', 'Two scenes snapped to different grids, even 0.5 pixel offset creates alignment errors in stacked bands.', 'Set Snap Raster environment to a reference raster before any resampling. All outputs then share the same grid origin.'],
            ['Band ordering errors', 'Compositing tool or export reorders bands, RF trained on stack order B2/B3/B4/B8 fails if applied to B4/B3/B2/B8.', 'Document and verify band order explicitly. In ArcPro use Composite Bands tool with bands listed in explicit order. Add band metadata comment to project notes.'],
            ['Cloud contamination at scene edges', 'Orbit path edges have thinner cloud mask coverage (fewer observations).', 'When mosaicking, give priority to scene centers over edges. Use overlap area statistics to identify contaminated zones.'],
          ]}
        />

        <div style={{ background: '#f1f5f9', borderRadius: 8, padding: 14, marginTop: 12, fontSize: 14, color: '#334155' }}>
          <strong>ArcPro Mosaic Dataset workflow:</strong> Create Mosaic Dataset → Add Rasters → Calculate Statistics → Build Overviews → Set Mosaic Method (By Attribute or Seamline). For radiometric balancing: right-click mosaic → Color Balance → Dodging with Mean target. Export final mosaic with Clip Raster or Copy Raster to a single GeoTIFF before RF training.
        </div>
      </Card>
    </div>
  );
}
