// SECTION 3: Spectral Indices
// ============================================================
function Section3() {
  const [selectedIndex, setSelectedIndex] = React.useState('NDVI');
  const [bands, setBands] = React.useState({ Blue: 0.03, Green: 0.05, Red: 0.04, NIR: 0.40, SWIR1: 0.15, SWIR2: 0.06 });
  const [selectedCover, setSelectedCover] = React.useState('Conifer Forest');
  const [seasonalIndex, setSeasonalIndex] = React.useState('NDVI');

  const idx = INDEX_DEFS[selectedIndex];
  const computedValue = idx.calc(bands);

  const applyPreset = (name) => setBands({ ...BAND_PRESETS[name] });

  // Build cover type comparison data
  const coverBands = {
    'Conifer Forest':   { Blue: 0.02, Green: 0.05, Red: 0.03, RedEdge: 0.12, NIR: 0.35, SWIR1: 0.15, SWIR2: 0.05 },
    'Deciduous Forest': { Blue: 0.03, Green: 0.08, Red: 0.04, RedEdge: 0.18, NIR: 0.45, SWIR1: 0.20, SWIR2: 0.08 },
    'Shrub':            { Blue: 0.04, Green: 0.07, Red: 0.05, RedEdge: 0.14, NIR: 0.35, SWIR1: 0.18, SWIR2: 0.07 },
    'Grass':            { Blue: 0.04, Green: 0.10, Red: 0.06, RedEdge: 0.14, NIR: 0.48, SWIR1: 0.25, SWIR2: 0.10 },
    'Water':            { Blue: 0.06, Green: 0.04, Red: 0.03, RedEdge: 0.01, NIR: 0.01, SWIR1: 0.00, SWIR2: 0.00 },
    'Algal Bloom':      { Blue: 0.04, Green: 0.14, Red: 0.05, RedEdge: 0.10, NIR: 0.20, SWIR1: 0.03, SWIR2: 0.01 },
    'Bare Soil':        { Blue: 0.10, Green: 0.15, Red: 0.20, RedEdge: 0.22, NIR: 0.25, SWIR1: 0.35, SWIR2: 0.30 },
  };
  const comparisonData = Object.keys(INDEX_DEFS).map(name => {
    const d = { index: name };
    d.value = INDEX_DEFS[name].calc(coverBands[selectedCover]);
    return d;
  });

  // Seasonal data
  const seasonalData = SEASONAL_PROFILES.months.map((m, i) => ({
    month: m,
    'Conifer': SEASONAL_PROFILES.conifer[seasonalIndex][i],
    'Deciduous': SEASONAL_PROFILES.deciduous[seasonalIndex][i],
  }));

  // Color for computed value
  const valColor = computedValue > 0.5 ? '#22c55e' : computedValue > 0.2 ? '#F9A134' : computedValue > 0 ? '#ef4444' : '#6b7280';

  return (
    <div>
      <SectionTitle id="sec-3">3. Spectral Indices: What They Are & How They Work</SectionTitle>

      <Card>
        <p>A <strong>spectral index</strong> is a mathematical combination of two or more spectral bands designed to highlight a specific surface property. The most common form is a <strong>normalized difference ratio</strong>: (Band A - Band B) / (Band A + Band B). This normalization produces values between -1 and +1, making comparisons consistent across different lighting conditions and sensor calibrations.</p>
        <p>Each index is designed to exploit specific physical properties: NDVI uses the contrast between red absorption and NIR reflection by vegetation; NDMI uses the moisture sensitivity of SWIR; NDWI exploits water's absorption of NIR relative to green light.</p>
      </Card>

      <Card>
        <SubHeading>Index Formula Playground</SubHeading>
        <p>Select an index and adjust the band reflectance values to see how the formula responds. Use the presets to see typical values for different surface types.</p>

        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 16 }}>
          {Object.keys(INDEX_DEFS).map(name => (
            <ToggleButton key={name} label={name} active={selectedIndex === name}
              onClick={() => setSelectedIndex(name)} />
          ))}
        </div>

        <Formula>{`${selectedIndex} = ${idx.formula}`}</Formula>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 24, alignItems: 'start', marginTop: 16 }}>
          <div>
            {['Blue', 'Green', 'Red', 'NIR', 'SWIR1', 'SWIR2'].map(b => (
              <SliderRow key={b} label={b} value={bands[b]} min={0} max={0.6}
                onChange={v => setBands(prev => ({ ...prev, [b]: v }))} />
            ))}
          </div>
          <div style={{ textAlign: 'center', padding: 24, background: '#f1f5f9', borderRadius: 12, minWidth: 140 }}>
            <div style={{ fontSize: 14, color: '#94a3b8', marginBottom: 4 }}>{selectedIndex}</div>
            <div style={{ fontSize: 44, fontWeight: 700, color: valColor }}>
              {isFinite(computedValue) ? computedValue.toFixed(3) : 'N/A'}
            </div>
            <div style={{ fontSize: 14, color: '#94a3b8', marginTop: 8 }}>{idx.desc}</div>
          </div>
        </div>

        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginTop: 16 }}>
          <span style={{ fontSize: 15, color: '#94a3b8', alignSelf: 'center' }}>Presets:</span>
          {Object.keys(BAND_PRESETS).map(name => (
            <button key={name} onClick={() => applyPreset(name)}
              style={{ padding: '4px 12px', borderRadius: 6, fontSize: 15, background: '#ffffff', color: '#334155',
                border: '1px solid #cbd5e1', cursor: 'pointer' }}>
              {name}
            </button>
          ))}
        </div>
      </Card>

      <Card>
        <SubHeading>Index Values by Cover Type</SubHeading>
        <p>See how all indices respond to a single cover type. Switch between types to understand which indices are most discriminating.</p>

        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 16 }}>
          {Object.keys(coverBands).map(name => (
            <ToggleButton key={name} label={name} active={selectedCover === name}
              onClick={() => setSelectedCover(name)} />
          ))}
        </div>

        <ResponsiveContainer width="100%" height={420}>
          <BarChart data={comparisonData} margin={{ top: 10, right: 10, left: 10, bottom: 20 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" opacity={0.3} />
            <XAxis dataKey="index" tick={{ fontSize: 14 }} />
            <YAxis tick={{ fontSize: 14 }} domain={[-1, 1]} />
            <Tooltip contentStyle={{ background: '#ffffff', border: '1px solid #475569', borderRadius: 8 }}
              formatter={(v) => [v.toFixed(3)]} />
            <ReferenceLine y={0} stroke="#4b5563" />
            <Bar dataKey="value" radius={[4, 4, 0, 0]}>
              {comparisonData.map((d, i) => (
                <Cell key={i} fill={d.value >= 0 ? '#1193BA' : '#ef4444'} />
              ))}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      </Card>

      <Card>
        <SubHeading>Seasonal Index Timeline</SubHeading>
        <p>Deciduous trees show dramatic spectral changes across seasons (green-up in spring, senescence in fall), while conifers remain relatively stable. This phenological difference is one of the most powerful features for species classification, computing <strong>summer minus fall index values</strong> isolates the deciduous signal.</p>

        <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
          {['NDVI', 'EVI2'].map(idx => (
            <ToggleButton key={idx} label={idx} active={seasonalIndex === idx}
              onClick={() => setSeasonalIndex(idx)} />
          ))}
        </div>

        <ResponsiveContainer width="100%" height={420}>
          <AreaChart data={seasonalData} margin={{ top: 30, right: 20, left: 55, bottom: 45 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" opacity={0.3} />
            <XAxis dataKey="month" tick={{ fontSize: 14 }} />
            <YAxis tick={{ fontSize: 14 }} domain={[0, 1]}
              label={{ value: seasonalIndex, angle: -90, position: 'insideLeft', offset: 30, fontSize: 14, fill: '#94a3b8' }} />
            <Tooltip contentStyle={{ background: '#ffffff', border: '1px solid #475569', borderRadius: 8 }}
              formatter={(v) => [v.toFixed(2)]} />
            <Area type="monotone" dataKey="Conifer" stroke="#2d6a4f" fill="#2d6a4f" fillOpacity={0.2} strokeWidth={2} />
            <Area type="monotone" dataKey="Deciduous" stroke="#52b788" fill="#52b788" fillOpacity={0.2} strokeWidth={2} />
            <Legend wrapperStyle={{ fontSize: 15 }} />
            {/* Annotate seasonal events */}
            <ReferenceLine x="Apr" stroke="#F9A134" strokeDasharray="3 3" label={{ value: 'Green-up', fontSize: 13, fill: '#d97706', position: 'top' }} />
            <ReferenceLine x="Jul" stroke="#22c55e" strokeDasharray="3 3" label={{ value: 'Peak', fontSize: 13, fill: '#22c55e', position: 'top' }} />
            <ReferenceLine x="Oct" stroke="#ef4444" strokeDasharray="3 3" label={{ value: 'Senescence', fontSize: 13, fill: '#ef4444', position: 'top' }} />
          </AreaChart>
        </ResponsiveContainer>

        <div style={{ background: '#f1f5f9', borderRadius: 8, padding: 12, marginTop: 12, fontSize: 16, color: '#64748b' }}>
          <strong style={{ color: '#F9A134' }}>Seasonal Differencing:</strong> Subtracting one season's index from another captures phenological variation that single-date imagery misses. For vegetation, summer-minus-fall EVI2 separates deciduous (large swing) from evergreen (near-zero change). For water quality, summer-minus-spring NDCI tracks algal bloom development. For coastal mapping, dry-minus-wet season NDWI clarifies intertidal zones. Seasonal difference features consistently rank among the top predictors in ESA RF models.
        </div>
      </Card>

      <Card>
        <SubHeading>Index Selection Guide</SubHeading>
        <MTable
          headers={['Index', 'Formula', 'Best For', 'Limitations']}
          rows={Object.entries(INDEX_DEFS).map(([name, d]) => [
            name, d.formula, d.bestFor, d.limitations
          ])}
        />
      </Card>
    </div>
  );
}

// ============================================================
// SECTION 4: Derivative Layers
// ============================================================
function Section4() {
  const [activeLayers, setActiveLayers] = React.useState({
    spectral: true, indices: true, seasonal: true, lidar: true, terrain: true
  });

  const toggleLayer = (l) => setActiveLayers(prev => ({ ...prev, [l]: !prev[l] }));

  const layerGroups = [
    { id: 'spectral', name: 'Spectral Bands', count: 6, color: '#ef4444', desc: 'Raw band reflectance (Blue, Green, Red, NIR, SWIR1, SWIR2)' },
    { id: 'indices', name: 'Vegetation Indices', count: 4, color: '#22c55e', desc: 'NDVI, EVI2, NDMI, NDWI, derived from band math' },
    { id: 'seasonal', name: 'Seasonal Differences', count: 4, color: '#f97316', desc: 'Summer minus Fall for NDVI, EVI2, phenological signal' },
    { id: 'lidar', name: 'LiDAR Structure', count: 4, color: '#a855f7', desc: 'CHM, canopy texture, ground returns, relative peakness' },
    { id: 'terrain', name: 'Terrain', count: 3, color: '#3b82f6', desc: 'Slope, aspect, TWI, terrain position, solar exposure, and soil moisture potential' },
  ];

  const totalFeatures = layerGroups.filter(g => activeLayers[g.id]).reduce((sum, g) => sum + g.count, 0);

  // Feature importance by category
  const categoryImportance = {};
  FEATURE_IMPORTANCE.forEach(f => {
    if (!categoryImportance[f.category]) categoryImportance[f.category] = { category: f.category, importance: 0, count: 0 };
    categoryImportance[f.category].importance += f.mda;
    categoryImportance[f.category].count += 1;
  });
  const catData = Object.values(categoryImportance).sort((a, b) => b.importance - a.importance);

  return (
    <div>
      <SectionTitle id="sec-4">4. Derivative Layers: Structure, Texture & Terrain</SectionTitle>

      <Card>
        <p>An RF model does not just see a single satellite image; it sees a <strong>stack of co-registered layers</strong>, each capturing a different aspect of the landscape. Raw spectral bands form the foundation, but adding derived indices, seasonal differences, LiDAR structural metrics, and terrain variables substantially improves classification accuracy. The layer stack concept is fundamental to understanding why RF classification outperforms visual interpretation.</p>
      </Card>

      <Card>
        <SubHeading>Layer Stack Builder</SubHeading>
        <p>Toggle layer groups on and off to build a conceptual input stack. Each group adds predictive features to the RF model.</p>

        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 16 }}>
          {layerGroups.map(g => (
            <ToggleButton key={g.id} label={g.name} active={activeLayers[g.id]}
              onClick={() => toggleLayer(g.id)} />
          ))}
        </div>

        <div style={{ display: 'flex', gap: 24, alignItems: 'start', flexWrap: 'wrap' }}>
          {/* Visual stack */}
          <div style={{ flex: '0 0 200px' }}>
            {layerGroups.filter(g => activeLayers[g.id]).reverse().map((g, i) => (
              <div key={g.id} style={{
                background: g.color, opacity: 0.3, padding: '8px 12px', borderRadius: i === 0 ? '8px 8px 0 0' : i === layerGroups.filter(g2 => activeLayers[g2.id]).length - 1 ? '0 0 8px 8px' : 0,
                borderBottom: '1px solid #111827', textAlign: 'center',
              }}>
                <span style={{ fontSize: 15, fontWeight: 600, color: '#fff', opacity: 1 / 0.3 }}>{g.name} ({g.count})</span>
              </div>
            ))}
            <div style={{ textAlign: 'center', marginTop: 8 }}>
              <div style={{ fontSize: 30, fontWeight: 700, color: '#1193BA' }}>{totalFeatures}</div>
              <div style={{ fontSize: 14, color: '#94a3b8' }}>total features</div>
            </div>
          </div>

          {/* Layer descriptions */}
          <div style={{ flex: 1 }}>
            {layerGroups.filter(g => activeLayers[g.id]).map(g => (
              <div key={g.id} style={{ display: 'flex', gap: 12, marginBottom: 10 }}>
                <div style={{ width: 4, borderRadius: 2, background: g.color, flexShrink: 0 }} />
                <div>
                  <div style={{ fontSize: 16, fontWeight: 600, color: g.color }}>{g.name}</div>
                  <div style={{ fontSize: 15, color: '#64748b' }}>{g.desc}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </Card>

      <Card>
        <SubHeading>Feature Importance by Category</SubHeading>
        <p>This chart shows how much predictive power each category of features contributes to a typical land cover classification RF model. Seasonal differences and LiDAR structure often outperform raw spectral bands.</p>

        <ResponsiveContainer width="100%" height={320}>
          <BarChart data={catData} layout="vertical" margin={{ top: 5, right: 20, left: 100, bottom: 50 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" opacity={0.3} />
            <XAxis type="number" tick={{ fontSize: 14 }}
              label={{ value: 'Cumulative MDA Importance', position: 'bottom', offset: 15, fontSize: 14, fill: '#94a3b8' }} />
            <YAxis type="category" dataKey="category" tick={{ fontSize: 15 }} width={90} />
            <Tooltip contentStyle={{ background: '#ffffff', border: '1px solid #475569', borderRadius: 8 }}
              formatter={(v, name, props) => [`${v.toFixed(3)} (${props.payload.count} features)`, 'Total MDA']} />
            <Bar dataKey="importance" radius={[0, 4, 4, 0]}>
              {catData.map((d, i) => (
                <Cell key={i} fill={CATEGORY_COLORS[d.category] || '#6b7280'} />
              ))}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      </Card>

      <Card>
        <SubHeading>Structure & Texture Layers</SubHeading>
        <MTable
          headers={['Layer', 'Source', 'What It Captures']}
          rows={[
            ['CHM (Canopy Height Model)', 'LiDAR: DSM - DEM', 'Tree height above ground'],
            ['Canopy Cover %', 'LiDAR point density ratios', 'Proportion of area with overhead canopy'],
            ['GLCM Texture', 'Any band (computed)', 'Spatial heterogeneity, homogeneity, contrast, entropy'],
            ['Slope / Aspect / TWI', 'DEM derivatives', 'Slope controls runoff energy; aspect drives solar exposure and moisture regime; TWI (ln(a / tan β)) predicts soil saturation, high TWI = flat with large upslope contributing area (likely wet); low TWI = steep ridge (likely dry). Critical predictor for wetland and riparian mapping.'],
            ['Relative Peakness', 'LiDAR CHM', 'How pronounced individual tree crowns are vs. surrounding canopy'],
            ['Pct Ground Returns', 'LiDAR point cloud', 'Inverse measure of canopy density, more ground = less canopy'],
          ]}
        />
      </Card>

      <Card>
        <SubHeading>LiDAR → Raster Derivative Workflow</SubHeading>
        <p>LiDAR products don't come ready-to-use from the provider, raw point clouds must be processed into analysis-ready rasters. This workflow is required before any LiDAR-derived features can enter an RF model.</p>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 16 }}>
          {[
            { step: '1', label: 'Receive & Inspect LAS/LAZ Files', detail: 'Check point density (target ≥ 8 pts/m² for canopy structure), point classification status (ground / vegetation / unclassified), CRS, and vertical datum. Use ArcPro LAS Dataset or lasinfo (LAStools).', color: '#1193BA' },
            { step: '2', label: 'Classify Ground Returns', detail: 'If ground returns are unclassified: LAS Dataset → Classify LAS Ground (ArcPro Spatial Analyst). Alternatively use LAStools lasground. Ground classification quality determines DEM accuracy, inspect with cross-section view.', color: '#00A79D' },
            { step: '3', label: 'Create DEM (Bare Earth)', detail: 'LAS Dataset to Raster → Binning → MINIMUM (for ground) or IDW → cell size matching project imagery (typically 1m or 0.5m). Filter to ground-classified returns only (Class 2).', color: '#8FCEA5' },
            { step: '4', label: 'Create DSM (Surface)', detail: 'LAS Dataset to Raster → Binning → MAXIMUM → all returns or first returns only. Captures top of canopy surface including buildings. Cell size = same as DEM.', color: '#F9A134' },
            { step: '5', label: 'Compute nDSM / CHM', detail: 'Raster Calculator: nDSM = DSM - DEM. This is the Canopy Height Model, height above ground for every pixel. Negative values indicate DEM/DSM inconsistencies; use Con(nDSM < 0, 0, nDSM) to zero-floor.', color: '#a855f7' },
            { step: '6', label: 'Derive Analysis Features', detail: 'From CHM: Focal Statistics (Mean/Std/Max in 3×3 or 5×5 kernel) for texture. From point cloud: Point Density tool for canopy cover %. TWI from DEM using Flow Direction + Flow Accumulation tools. All outputs must snap to project raster grid.', color: '#ef4444' },
          ].map(s => (
            <div key={s.step} style={{ display: 'flex', gap: 12, alignItems: 'flex-start', background: '#f8fafc', borderRadius: 8, padding: '10px 14px', borderLeft: `3px solid ${s.color}` }}>
              <div style={{ minWidth: 28, height: 28, borderRadius: '50%', background: s.color, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: 14, flexShrink: 0 }}>{s.step}</div>
              <div>
                <div style={{ fontWeight: 600, color: '#334155', fontSize: 15 }}>{s.label}</div>
                <div style={{ fontSize: 14, color: '#64748b', marginTop: 3 }}>{s.detail}</div>
              </div>
            </div>
          ))}
        </div>

        <MTable
          headers={['Issue', 'Symptom', 'Fix']}
          rows={[
            ['Void / NoData areas', 'Pits in DEM over water bodies, low-density scan lines', 'Fill NoData: Focal Statistics (MEAN, rectangular kernel) applied iteratively, or ArcPro Fill Raster tool'],
            ['CHM negative values', 'DSM < DEM due to interpolation artifacts or datum mismatch', 'Con(CHM < 0, 0, CHM) in Raster Calculator; verify both DEM and DSM use same vertical datum'],
            ['Misaligned with imagery', 'LiDAR on different CRS or cell origin than satellite imagery', 'Reproject to project CRS; set Snap Raster environment to match imagery grid before running LAS Dataset to Raster'],
            ['Overly smooth CHM', 'Aggressive smoothing during interpolation loses canopy texture', 'Use Binning → MAXIMUM (not IDW) for DSM. IDW smooths peaks, reducing tree height accuracy'],
          ]}
        />
      </Card>
    </div>
  );
}

// ============================================================
// SECTION 5: Random Forest, How It Works
// ============================================================
function Section5() {
  const [treeStep, setTreeStep] = React.useState(0);
  const [nTrees, setNTrees] = React.useState(50);
  const [votes, setVotes] = React.useState(null);
  const [bootstrapSamples, setBootstrapSamples] = React.useState([]);
  const [bootstrapOOB, setBootstrapOOB] = React.useState([]);

  // Decision tree data
  const treeNodes = [
    { id: 0, level: 0, text: 'NDVI > 0.45?', x: 55, y: 10 },
    { id: 1, level: 1, text: 'CHM > 10m?',   x: 28, y: 32, parent: 0, branch: 'Yes' },
    { id: 2, level: 1, text: 'SWIR1 < 0.15?',x: 82, y: 32, parent: 0, branch: 'No' },
    { id: 3, level: 2, text: 'Forest',        x: 13, y: 57, parent: 1, branch: 'Yes', leaf: true, color: '#2d6a4f' },
    { id: 4, level: 2, text: 'NDWI > 0.1?',  x: 40, y: 57, parent: 1, branch: 'No' },
    { id: 5, level: 2, text: 'Water',         x: 70, y: 57, parent: 2, branch: 'Yes', leaf: true, color: '#457b9d' },
    { id: 6, level: 2, text: 'Bare Soil',     x: 97, y: 57, parent: 2, branch: 'No', leaf: true, color: '#d4a373' },
    { id: 7, level: 3, text: 'Shrub',         x: 29, y: 80, parent: 4, branch: 'Yes', leaf: true, color: '#95d5b2' },
    { id: 8, level: 3, text: 'Herbaceous',    x: 51, y: 80, parent: 4, branch: 'No',  leaf: true, color: '#a7c957' },
  ];

  const visibleNodes = treeNodes.filter(n => {
    if (n.level === 0) return true;
    if (treeStep >= n.level) return true;
    return false;
  });

  // Generate ensemble votes
  React.useEffect(() => {
    const classes = ['Forest', 'Shrub', 'Herbaceous', 'Water', 'Bare Soil'];
    const classColors = { Forest: '#2d6a4f', Shrub: '#95d5b2', Herbaceous: '#a7c957', Water: '#457b9d', 'Bare Soil': '#d4a373' };
    // Weighted probabilities (Forest is "true" class)
    const weights = [0.55, 0.15, 0.12, 0.08, 0.10];
    const newVotes = {};
    classes.forEach(c => newVotes[c] = 0);
    for (let i = 0; i < nTrees; i++) {
      let r = Math.random();
      let cumul = 0;
      for (let j = 0; j < classes.length; j++) {
        cumul += weights[j];
        if (r <= cumul) { newVotes[classes[j]]++; break; }
      }
    }
    setVotes({ counts: newVotes, colors: classColors, total: nTrees });
  }, [nTrees]);

  const regenerateVotes = () => {
    setNTrees(prev => prev); // Force re-render
    // Small trick: toggle a dummy to force useEffect
    setNTrees(n => n === 50 ? 50.001 : Math.round(n));
  };

  // Bootstrap sampling
  const drawBootstrap = () => {
    const n = 20;
    const selected = [];
    const counts = new Array(n).fill(0);
    for (let i = 0; i < n; i++) {
      const idx = Math.floor(Math.random() * n);
      selected.push(idx);
      counts[idx]++;
    }
    setBootstrapSamples(counts);
    setBootstrapOOB(counts.map(c => c === 0));
  };

  return (
    <div>
      <SectionTitle id="sec-5">5. Random Forest: How It Works</SectionTitle>

      <Card>
        <p><strong>Random Forest</strong> is an ensemble machine learning algorithm that builds hundreds of decision trees, each trained on a random subset of the data and features. The final prediction is determined by <strong>majority vote</strong> (for classification) or <strong>averaging</strong> (for regression). The "random" in Random Forest comes from two sources of randomness: <strong>bootstrap sampling</strong> (each tree sees a different subset of training data) and <strong>random feature selection</strong> (each split only considers a random subset of features).</p>

        <div style={{ background: '#f1f5f9', borderRadius: 8, padding: 16, margin: '12px 0', fontSize: 16, color: '#64748b' }}>
          <strong style={{ color: '#1193BA' }}>The Elevator Pitch:</strong> "We stack satellite imagery and terrain data into spectral and structural layers, feed them to a random forest, hundreds of decision trees that each vote independently, then validate with held-out samples to measure how often we're right, and more importantly, where we're wrong."
        </div>
      </Card>

      <Card>
        <SubHeading>Decision Tree Step-Through</SubHeading>
        <p>A single decision tree makes a series of binary splits on feature values. Click "Next Split" to step through how a pixel gets classified.</p>

        <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
          <button onClick={() => setTreeStep(Math.min(treeStep + 1, 3))}
            style={{ padding: '6px 16px', borderRadius: 6, fontSize: 16, fontWeight: 600, background: '#1193BA', color: '#fff', border: 'none', cursor: 'pointer' }}>
            Next Split
          </button>
          <button onClick={() => setTreeStep(0)}
            style={{ padding: '6px 16px', borderRadius: 6, fontSize: 16, background: '#f1f5f9', color: '#64748b', border: '1px solid #cbd5e1', cursor: 'pointer' }}>
            Reset
          </button>
          <span style={{ fontSize: 15, color: '#94a3b8', alignSelf: 'center' }}>Level {treeStep} / 3</span>
        </div>

        {/* SVG Tree */}
        <svg viewBox="0 0 110 90" style={{ width: '100%', maxWidth: 700, height: 'auto', margin: '0 auto', display: 'block' }}>
          {/* Draw edges */}
          {visibleNodes.filter(n => n.parent !== undefined).map(n => {
            const parent = treeNodes.find(p => p.id === n.parent);
            return (
              <g key={`edge-${n.id}`}>
                <line x1={parent.x} y1={parent.y + 5} x2={n.x} y2={n.y - 3}
                  stroke="#4b5563" strokeWidth="0.3" />
                <text x={(parent.x + n.x) / 2 + (n.x < parent.x ? -3 : 3)} y={(parent.y + n.y) / 2}
                  fontSize="3" fill="#6b7280" textAnchor="middle">{n.branch}</text>
              </g>
            );
          })}
          {/* Draw nodes */}
          {visibleNodes.map(n => (
            <g key={n.id}>
              <rect x={n.x - 11} y={n.y - 4} width={22} height={8} rx={n.leaf ? 4 : 2}
                fill={n.leaf ? n.color : '#1e293b'} stroke={n.leaf ? n.color : '#1193BA'} strokeWidth="0.3" opacity={n.leaf ? 0.8 : 1} />
              <text x={n.x} y={n.y + 1.2} fontSize="2.8" fill={n.leaf ? '#fff' : '#d1d5db'}
                textAnchor="middle" fontWeight={n.leaf ? 700 : 400}>{n.text}</text>
            </g>
          ))}
        </svg>

        <div style={{ fontSize: 15, color: '#94a3b8', textAlign: 'center', marginTop: 8 }}>
          {treeStep === 0 && 'Start: the root node asks the first question about the pixel.'}
          {treeStep === 1 && 'Level 1: the data splits based on the first question. Each branch asks a new question.'}
          {treeStep === 2 && 'Level 2: more splits produce leaf nodes (colored) with class predictions.'}
          {treeStep >= 3 && 'Level 3: all leaves reached. This single tree has made its prediction.'}
        </div>
      </Card>

      <Card>
        <SubHeading>Ensemble Voting Demo</SubHeading>
        <p>Each tree in the forest independently classifies a pixel, then they all vote. As you add more trees, the vote proportions stabilize, this is why RF is more reliable than any single decision tree.</p>

        <SliderRow label="# Trees" value={Math.round(nTrees)} min={10} max={200} step={10}
          onChange={(v) => setNTrees(v)} />

        {votes && (
          <div>
            {/* Stacked vote bar */}
            <div style={{ display: 'flex', height: 40, borderRadius: 8, overflow: 'hidden', marginBottom: 12 }}>
              {Object.entries(votes.counts).filter(([_, v]) => v > 0).map(([cls, count]) => (
                <div key={cls} style={{
                  width: (count / votes.total * 100) + '%', background: votes.colors[cls],
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 14, fontWeight: 600, color: '#fff', minWidth: count > 0 ? 2 : 0,
                  transition: 'width 0.3s',
                }}>
                  {count > votes.total * 0.08 ? `${cls} (${Math.round(count/votes.total*100)}%)` : ''}
                </div>
              ))}
            </div>
            {/* Legend */}
            <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', justifyContent: 'center' }}>
              {Object.entries(votes.counts).map(([cls, count]) => (
                <div key={cls} style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 15, color: '#64748b' }}>
                  <div style={{ width: 10, height: 10, borderRadius: 2, background: votes.colors[cls] }} />
                  {cls}: {count} votes ({Math.round(count/votes.total*100)}%)
                </div>
              ))}
            </div>
            <div style={{ textAlign: 'center', marginTop: 8 }}>
              <span style={{ fontSize: 17, fontWeight: 700, color: '#1193BA' }}>
                Prediction: {Object.entries(votes.counts).sort((a,b) => b[1] - a[1])[0][0]}
              </span>
            </div>
          </div>
        )}
      </Card>

      <Card>
        <SubHeading>Bootstrap Sampling Visualizer</SubHeading>
        <p>Each tree trains on a <strong>bootstrap sample</strong>, drawn with replacement from the training data. About 63% of samples are selected (some more than once), while ~37% are left out ("out-of-bag") and used for free internal validation.</p>

        <button onClick={drawBootstrap}
          style={{ padding: '6px 16px', borderRadius: 6, fontSize: 16, fontWeight: 600, background: '#1193BA', color: '#fff', border: 'none', cursor: 'pointer', marginBottom: 16 }}>
          Draw Bootstrap Sample
        </button>

        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', justifyContent: 'center' }}>
          {Array.from({ length: 20 }).map((_, i) => {
            const count = bootstrapSamples[i] || 0;
            const isOOB = bootstrapOOB[i] || false;
            const hasDrawn = bootstrapSamples.length > 0;
            return (
              <div key={i} style={{
                width: 52, height: 52, borderRadius: '50%',
                background: !hasDrawn ? '#374151' : isOOB ? '#374151' : '#1193BA',
                border: hasDrawn && isOOB ? '2px dashed #F9A134' : '2px solid transparent',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 15, fontWeight: 600, color: !hasDrawn ? '#6b7280' : isOOB ? '#F9A134' : '#fff',
                transition: 'all 0.3s',
              }}>
                {hasDrawn ? (isOOB ? 'OOB' : `x${count}`) : i + 1}
              </div>
            );
          })}
        </div>

        {bootstrapSamples.length > 0 && (
          <div style={{ display: 'flex', gap: 24, justifyContent: 'center', marginTop: 12, fontSize: 15, color: '#64748b' }}>
            <span><span style={{ color: '#1193BA', fontWeight: 600 }}>Selected:</span> {bootstrapSamples.filter(c => c > 0).length} unique ({Math.round(bootstrapSamples.filter(c => c > 0).length / 20 * 100)}%)</span>
            <span><span style={{ color: '#F9A134', fontWeight: 600 }}>OOB:</span> {bootstrapOOB.filter(Boolean).length} ({Math.round(bootstrapOOB.filter(Boolean).length / 20 * 100)}%)</span>
          </div>
        )}
      </Card>

      <Card>
        <SubHeading>Why Random Forest Works Well for Remote Sensing</SubHeading>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: 12 }}>
          {[
            { title: 'Mixed Data Types', desc: 'Handles continuous spectral bands and categorical terrain classes together without preprocessing.' },
            { title: 'Feature Importance', desc: 'Naturally ranks which layers matter most: tells you which RS inputs are worth collecting.' },
            { title: 'Resistant to Overfitting', desc: 'Ensemble averaging cancels out noise from individual trees, given sufficient tree count.' },
            { title: 'No Distribution Assumptions', desc: 'Non-parametric: does not assume data follows a normal distribution like some classifiers.' },
            { title: 'Handles Correlated Predictors', desc: 'Spectral bands are highly correlated. RF handles this well via random feature subsets.' },
            { title: 'Scales to Large Data', desc: 'Can handle millions of pixels with 20+ predictor layers efficiently.' },
          ].map((item, i) => (
            <div key={i} style={{ background: '#f1f5f9', borderRadius: 8, padding: 14, borderLeft: '3px solid #1193BA' }}>
              <div style={{ fontSize: 16, fontWeight: 700, color: '#66CAD8', marginBottom: 4 }}>{item.title}</div>
              <div style={{ fontSize: 15, color: '#64748b' }}>{item.desc}</div>
            </div>
          ))}
        </div>
      </Card>

      <Card>
        <SubHeading>Training Data: Spatial Sampling &amp; Quality Rules</SubHeading>
        <p>The RF model is only as good as the training data. Two commonly overlooked failure modes: <strong>insufficient class samples</strong> (model can't learn the class) and <strong>spatial clustering</strong> (model overfits to one area and fails to generalize).</p>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(260px, 1fr))', gap: 12, marginBottom: 16 }}>
          {[
            { label: 'Minimum Samples / Class', value: '50–100+', detail: 'Rule of thumb: ≥ 50 training polygons or pixels per class for stable RF. For rare/complex classes (wetland subtypes, rare habitat) aim for 100+. Below 30 samples, per-class accuracy becomes highly variable.', color: '#1193BA' },
            { label: 'Spatial Distribution', value: 'Cover full AOI', detail: 'Training samples should be spread across the entire project area, different soil types, aspects, elevations, and landscape positions. Avoid collecting all forest samples from one stand. Use stratified spatial sampling across environmental gradients.', color: '#00A79D' },
            { label: 'Class Separability Check', value: 'Inspect spectral overlap', detail: 'Before training, plot the index histograms for each class. If two classes have nearly identical NDVI distributions, RF will struggle regardless of sample size. Add discriminating features (seasonal diffs, LiDAR) or reconsider class definitions.', color: '#F9A134' },
            { label: 'Independent Validation Set', value: '20–30% hold-out', detail: 'Set aside a spatially independent validation dataset, NOT from the same polygons used for training. Ideally from different field visits or map quadrants. OOB accuracy from RF is optimistic; independent validation is the honest metric.', color: '#8FCEA5' },
          ].map(c => (
            <div key={c.label} style={{ background: '#f8fafc', borderRadius: 8, padding: 14, borderLeft: `3px solid ${c.color}` }}>
              <div style={{ fontWeight: 700, color: c.color, fontSize: 17 }}>{c.value}</div>
              <div style={{ fontWeight: 600, color: '#334155', fontSize: 14, marginBottom: 4 }}>{c.label}</div>
              <div style={{ fontSize: 13, color: '#64748b' }}>{c.detail}</div>
            </div>
          ))}
        </div>

        <MTable
          headers={['Spatial Autocorrelation Problem', 'Why It Matters', 'Mitigation']}
          rows={[
            ['Training and validation samples from the same polygon cluster', 'Pixels within the same stand are highly correlated, random 80/20 split inflates accuracy by 5–15%. The model memorizes the training area rather than learning transferable patterns.', 'Buffer exclusion zones: when splitting train/validate, exclude a spatial buffer (e.g., 200–500m) around each training polygon from the validation set. Use spatial block cross-validation.'],
            ['All training polygons in one part of the landscape', 'Spectral properties vary with aspect, elevation, soil, a model trained only on north-facing slopes will misclassify south-facing equivalents.', 'Use stratified spatial sampling: divide AOI into quadrants or environmental strata, collect samples from each. Check distribution with a training sample density map.'],
            ['Training on one year, applying to another', 'Annual phenological variation changes index values. A model trained on a dry year will underperform in a wet year.', 'Use multi-year composites for training, or collect training data from the same imagery used for prediction. Document acquisition year in project metadata.'],
          ]}
        />
      </Card>
    </div>
  );
}

// ============================================================
// SECTION 6: Hyperparameter Tuning
// ============================================================
function Section6() {
  const [maxDepth, setMaxDepth] = React.useState(15);
  const [classWeightMode, setClassWeightMode] = React.useState('balanced');

  // Generate bias-variance curves based on max_depth
  const tuningData = [];
  for (let d = 1; d <= 30; d++) {
    const trainAcc = 0.5 + 0.5 * (1 - Math.exp(-d / 5));
    const valAcc = 0.5 + 0.4 * (1 - Math.exp(-d / 8)) - 0.15 * Math.max(0, (d - 15) / 15);
    tuningData.push({ depth: d, 'Training': Math.min(1, trainAcc), 'Validation': Math.max(0.4, valAcc) });
  }

  // Class weight visualization
  const classDistribution = [
    { name: 'Upland Veg', count: 300, weight: 1 },
    { name: 'Shrub', count: 120, weight: 1 },
    { name: 'Developed', count: 180, weight: 1 },
    { name: 'Open Water', count: 50, weight: 1 },
    { name: 'Rare Feature', count: 30, weight: 1 },
    { name: 'Bare/Soil', count: 80, weight: 1 },
  ];
  const total = classDistribution.reduce((s, c) => s + c.count, 0);
  const nClasses = classDistribution.length;
  const classWeightData = classDistribution.map(c => {
    let w = 1;
    if (classWeightMode === 'balanced') {
      w = total / (nClasses * c.count);
    } else if (classWeightMode === 'balanced_subsample') {
      w = total / (nClasses * c.count) * 0.9; // Slightly different
    }
    return { ...c, weight: parseFloat(w.toFixed(2)), effectiveSamples: Math.round(c.count * w) };
  });

  const hyperparams = [
    { name: 'n_estimators', purpose: 'Number of trees in the forest', typical: '200-500', danger: 'Too few → noisy; too many → diminishing returns, slow', icon: '🌲' },
    { name: 'max_depth', purpose: 'Maximum depth each tree can grow', typical: '15-25', danger: 'Too low → underfitting; too high → overfitting', icon: '📏' },
    { name: 'min_samples_split', purpose: 'Min samples needed to split a node', typical: '2-10', danger: 'Too low → splits on noise; too high → misses patterns', icon: '✂️' },
    { name: 'min_samples_leaf', purpose: 'Min samples in a terminal leaf', typical: '1-5', danger: 'Too low → overfitting; too high → underfitting', icon: '🍃' },
    { name: 'max_features', purpose: 'Features considered per split', typical: 'sqrt(n) for classification', danger: 'Too few → trees too random; all → trees too correlated', icon: '🎯' },
    { name: 'class_weight', purpose: 'Adjusts for imbalanced classes', typical: 'balanced_subsample', danger: 'None → rare classes ignored; too aggressive → majority class drops', icon: '⚖️' },
  ];

  return (
    <div>
      <SectionTitle id="sec-6">6. Hyperparameter Tuning</SectionTitle>

      <Card>
        <p>Hyperparameters are the settings you configure <strong>before</strong> training begins, they control how the model learns, not what it learns. The key challenge is finding the <strong>sweet spot</strong> between underfitting (model too simple, misses real patterns) and overfitting (model too complex, memorizes noise in training data).</p>
      </Card>

      <Card>
        <SubHeading>Bias-Variance Tradeoff Playground</SubHeading>
        <p>Adjust <code>max_depth</code> to see how model complexity affects training vs. validation accuracy. The gap between the two curves indicates overfitting.</p>

        <SliderRow label="max_depth" value={maxDepth} min={1} max={30} step={1}
          onChange={setMaxDepth} />

        <ResponsiveContainer width="100%" height={380}>
          <LineChart data={tuningData} margin={{ top: 30, right: 20, left: 55, bottom: 45 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" opacity={0.3} />
            <XAxis dataKey="depth" tick={{ fontSize: 14 }}
              label={{ value: 'max_depth', position: 'bottom', offset: 15, fontSize: 14, fill: '#94a3b8' }} />
            <YAxis tick={{ fontSize: 14 }} domain={[0.4, 1.05]}
              label={{ value: 'Accuracy', angle: -90, position: 'insideLeft', offset: 30, fontSize: 14, fill: '#94a3b8' }} />
            <Tooltip contentStyle={{ background: '#ffffff', border: '1px solid #475569', borderRadius: 8 }}
              formatter={(v) => [(v * 100).toFixed(1) + '%']} />
            <Line type="monotone" dataKey="Training" stroke="#22c55e" strokeWidth={2} dot={false} />
            <Line type="monotone" dataKey="Validation" stroke="#1193BA" strokeWidth={2} dot={false} />
            <ReferenceLine x={maxDepth} stroke="#F9A134" strokeWidth={2}
              label={{ value: `depth=${maxDepth}`, fontSize: 14, fill: '#d97706', position: 'top' }} />
            <Legend verticalAlign="top" wrapperStyle={{ fontSize: 15, paddingBottom: 8 }} />
            {/* Zone annotations */}
            <ReferenceLine x={8} stroke="#6b7280" strokeDasharray="3 3" />
            <ReferenceLine x={20} stroke="#6b7280" strokeDasharray="3 3" />
          </LineChart>
        </ResponsiveContainer>

        <div style={{ display: 'flex', justifyContent: 'space-around', marginTop: 8 }}>
          <span style={{ fontSize: 15, color: '#ef4444' }}>← Underfitting</span>
          <span style={{ fontSize: 15, color: '#22c55e', fontWeight: 600 }}>Sweet Spot</span>
          <span style={{ fontSize: 15, color: '#f97316' }}>Overfitting →</span>
        </div>
      </Card>

      <Card>
        <SubHeading>Hyperparameter Reference</SubHeading>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: 12 }}>
          {hyperparams.map(hp => (
            <div key={hp.name} style={{ background: '#f1f5f9', borderRadius: 8, padding: 14 }}>
              <div style={{ fontSize: 17, fontWeight: 700, color: '#66CAD8' }}>
                <code>{hp.name}</code>
              </div>
              <div style={{ fontSize: 15, color: '#334155', marginTop: 4 }}>{hp.purpose}</div>
              <div style={{ fontSize: 14, color: '#64748b', marginTop: 6 }}>
                <strong>Typical:</strong> {hp.typical}
              </div>
              <div style={{ fontSize: 14, color: '#F9A134', marginTop: 2 }}>
                {hp.danger}
              </div>
            </div>
          ))}
        </div>
      </Card>

      <Card>
        <SubHeading>Class Weight Balancer</SubHeading>
        <p>In ESA projects, rare features (jurisdictional wetlands, critical habitat patches, burned areas, algal bloom zones) are often underrepresented in training data. Class weighting adjusts the effective sample size so the model pays more attention to rare classes, a common challenge across habitat, wetland, coastal, and water quality projects.</p>

        <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
          {['none', 'balanced', 'balanced_subsample'].map(mode => (
            <ToggleButton key={mode} label={mode} active={classWeightMode === mode}
              onClick={() => setClassWeightMode(mode)} />
          ))}
        </div>

        <ResponsiveContainer width="100%" height={320}>
          <BarChart data={classWeightData} margin={{ top: 10, right: 20, left: 55, bottom: 20 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" opacity={0.3} />
            <XAxis dataKey="name" tick={{ fontSize: 14 }} />
            <YAxis tick={{ fontSize: 14 }}
              label={{ value: 'Effective Weight', angle: -90, position: 'insideLeft', offset: 30, fontSize: 14, fill: '#94a3b8' }} />
            <Tooltip contentStyle={{ background: '#ffffff', border: '1px solid #475569', borderRadius: 8 }}
              formatter={(v, name, props) => {
                const d = props.payload;
                return [`Weight: ${d.weight}, Raw: ${d.count}, Effective: ${d.effectiveSamples}`, d.name];
              }} />
            <Bar dataKey="weight" radius={[4, 4, 0, 0]}>
              {classWeightData.map((d, i) => (
                <Cell key={i} fill={d.name === 'Rare Feature' ? '#F9A134' : '#1193BA'} />
              ))}
            </Bar>
            <ReferenceLine y={1} stroke="#6b7280" strokeDasharray="3 3" label={{ value: 'weight=1', fontSize: 13, fill: '#94a3b8' }} />
          </BarChart>
        </ResponsiveContainer>

        <div style={{ fontSize: 15, color: '#64748b', textAlign: 'center', marginTop: 4 }}>
          {classWeightMode === 'none' && 'No weighting, each sample counts equally. Rare classes (Rare Feature: 30 samples) are easily overwhelmed by dominant classes (Upland Veg: 300). This is the most common cause of poor recall for minority classes.'}
          {classWeightMode === 'balanced' && 'Balanced, weights inversely proportional to class frequency. Rare Feature (30 samples) gets ~4.2x weight to compensate for its rarity. Use this when your rare class matters most, e.g., jurisdictional wetlands, critical habitat, algal bloom pixels.'}
          {classWeightMode === 'balanced_subsample' && 'Balanced subsample, recalculated per bootstrap draw. Slightly different weights each tree, adding diversity.'}
        </div>
      </Card>
    </div>
  );
}

// ============================================================
// SECTION 7: Accuracy Assessment
// ============================================================
function Section7() {
  const [cm, setCm] = React.useState(DEFAULT_CM.map(r => [...r]));
  const [prThreshold, setPrThreshold] = React.useState(0.5);
  const [accView, setAccView] = React.useState('producer');

  const total = cm.reduce((s, r) => s + r.reduce((s2, c) => s2 + c, 0), 0);
  const correct = cm.reduce((s, r, i) => s + r[i], 0);
  const oa = total > 0 ? correct / total : 0;

  // Per-class metrics
  const classMetrics = CM_CLASSES.map((cls, i) => {
    const tp = cm[i][i];
    const rowSum = cm[i].reduce((s, c) => s + c, 0); // predicted as i
    const colSum = cm.reduce((s, r) => s + r[i], 0); // actual i
    const precision = rowSum > 0 ? tp / rowSum : 0;
    const recall = colSum > 0 ? tp / colSum : 0;
    const f1 = (precision + recall) > 0 ? 2 * precision * recall / (precision + recall) : 0;
    return { cls, tp, precision, recall, f1 };
  });

  // Kappa
  const pe = CM_CLASSES.reduce((s, _, i) => {
    const rowSum = cm[i].reduce((s2, c) => s2 + c, 0);
    const colSum = cm.reduce((s2, r) => s2 + r[i], 0);
    return s + (rowSum * colSum);
  }, 0) / (total * total);
  const kappa = (1 - pe) > 0 ? (oa - pe) / (1 - pe) : 0;

  // Editable cell handler
  const updateCell = (r, c, val) => {
    const newCm = cm.map(row => [...row]);
    newCm[r][c] = Math.max(0, parseInt(val) || 0);
    setCm(newCm);
  };

  // PR curve data
  const prData = [];
  for (let t = 0; t <= 1; t += 0.02) {
    const recall = 1 - Math.pow(t, 0.8);
    const precision = 0.3 + 0.65 * Math.pow(t, 0.6);
    const f1 = (precision + recall) > 0 ? 2 * precision * recall / (precision + recall) : 0;
    prData.push({ threshold: parseFloat(t.toFixed(2)), Precision: parseFloat(precision.toFixed(3)), Recall: parseFloat(recall.toFixed(3)), F1: parseFloat(f1.toFixed(3)) });
  }
  const currentPR = prData.reduce((best, d) => Math.abs(d.threshold - prThreshold) < Math.abs(best.threshold - prThreshold) ? d : best, prData[0]);

  // Model quality radar
  const modelQualityData = [
    { metric: 'OA', 'Well-tuned': 0.88, 'Overfit': 0.75, 'Underfit': 0.65 },
    { metric: 'Kappa', 'Well-tuned': 0.84, 'Overfit': 0.68, 'Underfit': 0.55 },
    { metric: 'Macro F1', 'Well-tuned': 0.85, 'Overfit': 0.65, 'Underfit': 0.58 },
    { metric: 'Balanced Acc', 'Well-tuned': 0.86, 'Overfit': 0.70, 'Underfit': 0.60 },
  ];

  return (
    <div>
      <SectionTitle id="sec-7">7. Accuracy Assessment</SectionTitle>

      <Card>
        <p>Accuracy assessment is how we measure model performance and communicate confidence in deliverables to clients. No classification is perfect, the goal is to <strong>quantify where the model succeeds and where it fails</strong>, so stakeholders can make informed decisions. Multiple metrics exist because no single number tells the full story, especially with imbalanced classes.</p>
      </Card>

      <Card>
        <SubHeading>Interactive Confusion Matrix</SubHeading>
        <p>Click any cell to edit its value. All derived metrics (OA, Kappa, per-class Precision, Recall, F1) update in real time. The confusion matrix shows <strong>predicted class (rows) vs. actual class (columns)</strong>; diagonal cells are correct classifications.</p>

        {/* Summary stats */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 16 }}>
          <StatCard label="Overall Accuracy" value={(oa * 100).toFixed(1) + '%'} />
          <StatCard label="Kappa" value={kappa.toFixed(3)} />
          <StatCard label="Total Samples" value={total} />
          <StatCard label="Correct" value={correct} />
        </div>

        {/* Matrix grid */}
        <div style={{ overflowX: 'auto' }}>
          <table style={{ fontSize: 16, borderCollapse: 'collapse', margin: '0 auto' }}>
            <thead>
              <tr>
                <th style={{ padding: 8, color: '#94a3b8', fontSize: 14 }}>Predicted ↓ / Actual →</th>
                {CM_CLASSES.map(c => <th key={c} style={{ padding: 8, color: '#66CAD8', fontSize: 15, fontWeight: 600 }}>{c}</th>)}
              </tr>
            </thead>
            <tbody>
              {cm.map((row, ri) => (
                <tr key={ri}>
                  <td style={{ padding: 8, color: '#66CAD8', fontWeight: 600, fontSize: 15 }}>{CM_CLASSES[ri]}</td>
                  {row.map((val, ci) => {
                    const isDiag = ri === ci;
                    const maxVal = Math.max(...cm.flat());
                    const intensity = maxVal > 0 ? val / maxVal : 0;
                    return (
                      <td key={ci} style={{
                        padding: 4, textAlign: 'center',
                        background: isDiag
                          ? `rgba(17, 147, 186, ${0.18 + intensity * 0.55})`
                          : val > 0 ? `rgba(239, 68, 68, ${0.08 + intensity * 0.35})` : 'transparent',
                        borderRadius: 4,
                      }}>
                        <input type="number" value={val} min={0}
                          onChange={e => updateCell(ri, ci, e.target.value)}
                          style={{
                            width: 64, textAlign: 'center', fontSize: 18, fontWeight: isDiag ? 700 : 400,
                            background: 'transparent', color: isDiag ? '#004562' : '#334155',
                            border: '1px solid transparent', borderRadius: 4, padding: 4,
                          }}
                          onFocus={e => e.target.style.borderColor = '#1193BA'}
                          onBlur={e => e.target.style.borderColor = 'transparent'}
                        />
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* Per-class metrics */}
        <div style={{ marginTop: 16 }}>
          <MTable
            headers={['Class', 'Precision (User\'s)', 'Recall (Producer\'s)', 'F1 Score']}
            rows={classMetrics.map(m => [
              m.cls,
              (m.precision * 100).toFixed(1) + '%',
              (m.recall * 100).toFixed(1) + '%',
              m.f1.toFixed(3),
            ])}
          />
        </div>
      </Card>

      <Card>
        <SubHeading>Precision-Recall Tradeoff</SubHeading>
        <p>Adjusting the classification threshold trades off precision against recall. For ESA deliverables: <strong>high precision</strong> means conservative mapping (fewer false positives, "when we flag it, it's real"), while <strong>high recall</strong> means inclusive screening (fewer false negatives, "we found most of the features"). The right balance depends on the regulatory stakes: missing a jurisdictional wetland, critical habitat patch, or algal bloom is typically worse than a false positive.</p>

        <SliderRow label="Threshold" value={prThreshold} min={0} max={1} step={0.02}
          onChange={setPrThreshold} />

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12, marginBottom: 12 }}>
          <StatCard label="Precision" value={(currentPR.Precision * 100).toFixed(1) + '%'} sub="User's accuracy" />
          <StatCard label="Recall" value={(currentPR.Recall * 100).toFixed(1) + '%'} sub="Producer's accuracy" />
          <StatCard label="F1 Score" value={(currentPR.F1 * 100).toFixed(1) + '%'} sub="Harmonic mean" />
        </div>

        <ResponsiveContainer width="100%" height={420}>
          <LineChart data={prData} margin={{ top: 35, right: 20, left: 55, bottom: 55 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" opacity={0.3} />
            <XAxis dataKey="threshold" tick={{ fontSize: 14 }}
              label={{ value: 'Classification Threshold', position: 'bottom', offset: 15, fontSize: 14, fill: '#94a3b8' }} />
            <YAxis tick={{ fontSize: 14 }} domain={[0, 1]} />
            <Tooltip contentStyle={{ background: '#ffffff', border: '1px solid #475569', borderRadius: 8 }}
              formatter={(v) => [(v * 100).toFixed(1) + '%']} />
            <Line type="monotone" dataKey="Precision" stroke="#22c55e" strokeWidth={2} dot={false} />
            <Line type="monotone" dataKey="Recall" stroke="#ef4444" strokeWidth={2} dot={false} />
            <Line type="monotone" dataKey="F1" stroke="#F9A134" strokeWidth={2} dot={false} strokeDasharray="5 5" />
            <ReferenceLine x={prThreshold} stroke="#1193BA" strokeWidth={2} />
            <Legend verticalAlign="top" wrapperStyle={{ fontSize: 15, paddingBottom: 8 }} />
          </LineChart>
        </ResponsiveContainer>
      </Card>

      <Card>
        <SubHeading>Producer's vs. User's Accuracy</SubHeading>
        <p>These are two different perspectives on accuracy for each class:</p>

        <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
          <ToggleButton label="Producer's (Recall)" active={accView === 'producer'}
            onClick={() => setAccView('producer')} />
          <ToggleButton label="User's (Precision)" active={accView === 'user'}
            onClick={() => setAccView('user')} />
        </div>

        <div style={{ background: '#f1f5f9', borderRadius: 8, padding: 16 }}>
          {accView === 'producer' ? (
            <div>
              <p style={{ fontSize: 17, color: '#22c55e', fontWeight: 600, marginBottom: 8 }}>Producer's Accuracy (Recall), Column Perspective</p>
              <p style={{ fontSize: 16, color: '#334155' }}>"Of all the pixels that <strong>actually are</strong> Forest on the ground, what percentage did our model correctly identify as Forest?"</p>
              <p style={{ fontSize: 16, color: '#64748b', marginTop: 8 }}>Calculated by dividing the diagonal cell by the <strong>column total</strong>. Low producer's accuracy means the model is <strong>missing</strong> real instances of that class (false negatives).</p>
              <p style={{ fontSize: 15, color: '#94a3b8', marginTop: 8 }}>Think: "How completely did we map this class?", important for regulatory compliance where missing habitat is costly.</p>
            </div>
          ) : (
            <div>
              <p style={{ fontSize: 17, color: '#1193BA', fontWeight: 600, marginBottom: 8 }}>User's Accuracy (Precision), Row Perspective</p>
              <p style={{ fontSize: 16, color: '#334155' }}>"Of all the pixels our model <strong>called</strong> Forest, what percentage actually are Forest on the ground?"</p>
              <p style={{ fontSize: 16, color: '#64748b', marginTop: 8 }}>Calculated by dividing the diagonal cell by the <strong>row total</strong>. Low user's accuracy means the model is <strong>falsely labeling</strong> other things as that class (false positives).</p>
              <p style={{ fontSize: 15, color: '#94a3b8', marginTop: 8 }}>Think: "How much can I trust the map label?", important when clients use the map for field verification or decision-making.</p>
            </div>
          )}
        </div>
      </Card>

      <Card>
        <SubHeading>Reading Your Model Quality</SubHeading>
        <p>When you get your accuracy report, these patterns signal problems:</p>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 12, marginTop: 12 }}>
          {[
            { label: '✅ Well-tuned', desc: 'OA, Kappa, and per-class F1 all align. OOB ≈ validation accuracy. No single class dominates errors.', color: '#22c55e' },
            { label: '⚠️ Overfitting', desc: 'High training accuracy but validation OA drops 5–15%. OOB accuracy looks fine but independent test set suffers. Reduce max_depth or increase min_samples_leaf.', color: '#ef4444' },
            { label: '⚠️ Underfitting', desc: 'Low OA across the board. Large classes get classified okay; rare classes have poor recall. Add more features, increase tree depth, or collect more training data.', color: '#F9A134' },
            { label: '⚠️ Class Imbalance', desc: 'High overall OA but poor F1 for minority classes (wetland, rare habitat, algal bloom). Apply balanced_subsample weighting and prioritize recall for regulatory classes.', color: '#a855f7' },
          ].map(s => (
            <div key={s.label} style={{ background: '#f1f5f9', borderRadius: 8, padding: 14, borderLeft: `3px solid ${s.color}` }}>
              <div style={{ fontSize: 16, fontWeight: 700, color: s.color, marginBottom: 6 }}>{s.label}</div>
              <div style={{ fontSize: 15, color: '#334155' }}>{s.desc}</div>
            </div>
          ))}
        </div>
      </Card>

      <Card>
        <SubHeading>Regression Metrics</SubHeading>
        <p>When predicting continuous values (e.g., canopy cover percentage, biomass) rather than classes, different metrics apply:</p>
        <MTable
          headers={['Metric', 'What It Means', 'Interpretation']}
          rows={[
            ['R²', 'Proportion of variance explained by the model', '1 = perfect fit, 0 = no better than predicting the mean'],
            ['RMSE', 'Root Mean Squared Error, in the units of your target', 'Penalizes large errors more. Lower is better.'],
            ['MAE', 'Mean Absolute Error, average magnitude of error', 'Less sensitive to outliers than RMSE. Lower is better.'],
          ]}
        />
      </Card>

      <Card>
        <SubHeading>Spatial Cross-Validation: Why Standard k-Fold Fails</SubHeading>
        <p>Standard k-fold cross-validation randomly assigns samples to folds. For spatial data this is invalid: pixels from the same polygon end up in both train and test folds, and nearby polygons are spectrally correlated. The result is accuracy estimates that are 5–20% higher than what you'll actually achieve on new areas.</p>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 16 }}>
          <div style={{ background: '#fef2f2', borderRadius: 8, padding: 14, borderLeft: '3px solid #ef4444' }}>
            <div style={{ fontWeight: 700, color: '#991b1b', marginBottom: 6 }}>✗ Standard k-fold (wrong for RS)</div>
            <div style={{ fontSize: 14, color: '#7f1d1d' }}>Randomly splits pixels/polygons into k groups. Training and test samples may come from the same field polygon or neighboring stands. Spatial autocorrelation inflates all reported metrics, OA, Kappa, F1. Common trap: reporting 92% accuracy from random split, then delivering a product that performs at 78% on new areas.</div>
          </div>
          <div style={{ background: '#f0fdf4', borderRadius: 8, padding: 14, borderLeft: '3px solid #22c55e' }}>
            <div style={{ fontWeight: 700, color: '#166534', marginBottom: 6 }}>✓ Spatial block CV (correct)</div>
            <div style={{ fontSize: 14, color: '#14532d' }}>Divides the landscape into geographic blocks. One block at a time is held out as the test set; model is trained on all other blocks. Ensures training and test data are spatially separated, mimics predicting into new, unmapped areas. R package: <code>blockCV</code>. Python: <code>scikit-learn</code> with custom spatial splitter or <code>spatial-cv</code>.</div>
          </div>
        </div>

        <MTable
          headers={['CV Method', 'When to Use', 'Expected Accuracy Impact', 'ESA Recommendation']}
          rows={[
            ['Random k-fold', 'Internal model selection only (comparing hyperparameters). Never for final reported accuracy.', 'Optimistic by 5–20% for spatially clustered training data.', 'Use only for hyperparameter tuning comparisons, never report this as project accuracy.'],
            ['Spatial block CV', 'Standard for any RS classification project. Blocks sized to be larger than spatial autocorrelation range (typically 500m–2km).', 'More honest. Closer to what you\'ll see on independent field validation.', 'Default for all ESA RF deliverables. Report alongside independent field validation when available.'],
            ['Leave-One-Out (SLOO-CV)', 'Small training datasets where you can\'t afford to lose a full block. Leaves one polygon out at a time with a buffer exclusion zone.', 'Conservative but very honest for small datasets.', 'Useful for rare class validation (e.g., < 20 training polygons for a class).'],
            ['Independent field validation', 'Always preferred when budget allows. Separate field crews or separate field campaigns.', 'Gold standard, entirely independent of training.', 'Required for regulatory deliverables (Section 7, HCP, NEPA). Target n ≥ 30 per class for validation.'],
          ]}
        />

        <div style={{ background: '#f0f9ff', borderRadius: 8, padding: 14, marginTop: 12, fontSize: 14, color: '#0369a1' }}>
          <strong>Practical check:</strong> After training, apply your model to a spatially distinct sub-region that had <em>no</em> training samples. If accuracy drops more than 10–15 percentage points from your CV estimate, you have a spatial overfitting problem. The fix is more spatially distributed training data, not more trees.
        </div>
      </Card>
    </div>
  );
}

// ============================================================
// SECTION 8: Feature Importance
// ============================================================
function Section8() {
  const [highlightedFeature, setHighlightedFeature] = React.useState(null);

  const sortedMDI = [...FEATURE_IMPORTANCE].sort((a, b) => b.mdi - a.mdi);
  const sortedMDA = [...FEATURE_IMPORTANCE].sort((a, b) => b.mda - a.mda);

  // Treemap data by category
  const catGroups = {};
  FEATURE_IMPORTANCE.forEach(f => {
    if (!catGroups[f.category]) catGroups[f.category] = { name: f.category, children: [], totalMDA: 0 };
    catGroups[f.category].children.push({ name: f.name, size: Math.round(f.mda * 1000) });
    catGroups[f.category].totalMDA += f.mda;
  });
  const treemapData = Object.values(catGroups).map(g => ({
    name: g.name, size: Math.round(g.totalMDA * 1000), color: CATEGORY_COLORS[g.name],
  }));

  return (
    <div>
      <SectionTitle id="sec-8">8. Feature Importance: What Drives the Model</SectionTitle>

      <Card>
        <p><strong>Feature importance</strong> tells you which predictor layers contribute most to the model's accuracy. This is one of RF's most valuable outputs, it guides <strong>feature screening</strong> (removing uninformative layers to simplify the model) and validates whether the model is learning physically meaningful patterns.</p>
        <p>Two methods are commonly used, and they can produce <strong>different rankings</strong>:</p>
      </Card>

      <Card>
        <SubHeading>MDI vs. MDA: Side by Side</SubHeading>
        <p>Hover over any feature to highlight it in both charts. Notice how rank positions can shift between methods, features that rank high in MDI may drop in MDA and vice versa.</p>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
          {/* MDI Chart */}
          <div>
            <div style={{ fontSize: 16, fontWeight: 600, color: '#F9A134', marginBottom: 8, textAlign: 'center' }}>
              MDI (Gini Importance)
            </div>
            <div style={{ fontSize: 14, color: '#94a3b8', marginBottom: 8, textAlign: 'center' }}>
              How much impurity each feature reduces across all splits
            </div>
            {sortedMDI.map((f, i) => (
              <div key={f.name}
                onMouseEnter={() => setHighlightedFeature(f.name)}
                onMouseLeave={() => setHighlightedFeature(null)}
                style={{
                  display: 'flex', alignItems: 'center', gap: 8, marginBottom: 3, padding: '2px 4px',
                  borderRadius: 4, cursor: 'default',
                  background: highlightedFeature === f.name ? '#1e293b' : 'transparent',
                }}>

          {/* MDA Chart */}
          <div>

            </div>

                onMouseEnter={() => setHighlightedFeature(f.name)}
                onMouseLeave={() => setHighlightedFeature(null)}
                style={{

          <strong style={{ color: '#F9A134' }}>Key Difference:</strong> MDI (Gini) is computed during training and tends to favor high-cardinality and continuous features. MDA (Permutation) is computed on validation data and measures actual predictive contribution. <strong>MDA is generally preferred for reporting</strong> because it better reflects real-world predictive value.
        </div>

        {/* Category legend */}
        <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', marginTop: 12, justifyContent: 'center' }}>

      <Card>

        <p>Feature importance grouped by data source. This shows which <strong>types</strong> of input data drive model performance most, useful for deciding which data to prioritize in future projects.</p>

          </BarChart>
        </ResponsiveContainer>
      </Card>
    </div>
  );
}

    const g = displayGrid;
    if (dir === 'right' && c < 7) return g[r][c] !== g[r][c+1];
    if (dir === 'bottom' && r < 7) return g[r][c] !== g[r+1][c];
    return false;
  }

  const segMethods = [
    { name: 'Segment Mean Shift', tool: 'ArcGIS Pro', params: 'Spectral Detail, Spatial Detail, Min Segment Size',

  const paramCards = [

  return (
    <div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 24 }}>
        <Card style={{ borderLeft: '4px solid #94a3b8' }}>

            <li>Ignores spatial context & shape</li>
            <li>Works well at coarser resolutions (10–30 m)</li>
          </ul>
        </Card>
        <Card style={{ borderLeft: '4px solid #1193BA' }}>
          <div style={{ fontSize: 17, fontWeight: 700, color: '#1193BA', marginBottom: 8 }}>Object-Based Image Analysis (OBIA)</div>
          <ul style={{ margin: 0, paddingLeft: 20, fontSize: 15, color: '#64748b', lineHeight: 1.8 }}>
            <li>Pixels grouped into <em>segments</em> (objects) first</li>
            <li>Classifies objects using mean, shape, texture</li>
            <li>Cleaner output with fewer speckle artifacts</li>
            <li>Leverages spatial relationships & context</li>
            <li>Preferred for high-res imagery (sub-5 m)</li>
          </ul>
        </Card>
      </div>

      {/* Interactive pixel grid */}
      <Card>
        <div style={{ fontSize: 17, fontWeight: 700, color: '#334155', marginBottom: 4 }}>
          Pixel vs. Object Grid Demo
        </div>
        <div style={{ fontSize: 15, color: '#64748b', marginBottom: 16 }}>
          Toggle between pixel-based (noisy) and OBIA (segmented) classification of the same scene. Adjust scale to see how segment size changes.
        </div>

        <div style={{ display: 'flex', gap: 12, marginBottom: 16, flexWrap: 'wrap' }}>
          {['pixel','obia'].map(m => (
            <button key={m} onClick={() => setSegMode(m)} style={{
              padding: '8px 20px', borderRadius: 8, fontWeight: 600, fontSize: 15, cursor: 'pointer',
              background: segMode === m ? '#1193BA' : '#f1f5f9',
              color: segMode === m ? '#fff' : '#64748b',
              border: `2px solid ${segMode === m ? '#1193BA' : '#cbd5e1'}`,
            }}>{m === 'pixel' ? '🔲 Pixel-Based' : '🔷 OBIA / Segmented'}</button>

          {segMode === 'obia' && (
            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              <span style={{ fontSize: 14, color: '#64748b' }}>Scale:</span>

                  background: scaleLevel === s ? '#F9A134' : '#f1f5f9',
                  color: scaleLevel === s ? '#fff' : '#64748b',
                  border: `2px solid ${scaleLevel === s ? '#F9A134' : '#cbd5e1'}`,

              <div key={r} style={{ display: 'flex' }}>

                  <div key={c} style={{
                    width: 44, height: 44,
                    background: classColors[cls],
                    borderRight: hasBorder(r, c, 'right') ? '2.5px solid #fff' : '1px solid rgba(255,255,255,0.15)',
                    borderBottom: hasBorder(r, c, 'bottom') ? '2.5px solid #fff' : '1px solid rgba(255,255,255,0.15)',
                    opacity: segMode === 'pixel' ? 0.85 : 1,
                  }} />

              </div>
            ))}
          </div>

          {/* Legend + callout */}
          <div style={{ flex: 1, minWidth: 200 }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: '#334155', marginBottom: 10 }}>Cover Classes</div>

              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                <div style={{ width: 18, height: 18, borderRadius: 3, background: col }} />
